<template id="b2-home-flythrough-template">
  <div data-hf-id="hf-ti5g" data-composition-id="b2-home-flythrough" data-start="0" data-width="1080" data-height="1920">
    <div data-hf-id="hf-z1yt" class="b2-stage">
      <div data-hf-id="hf-smva" class="b2-orb b2-orb-a"></div>
      <div data-hf-id="hf-oor9" class="b2-orb b2-orb-b"></div>
      <div data-hf-id="hf-2uyw" class="b2-splats b2-splats-far" id="b2-splats-far"></div>
      <div data-hf-id="hf-lzl7" class="b2-persp">
        <div data-hf-id="hf-83e6" class="b2-cam">
          <div data-hf-id="hf-awh4" class="b2-frame">
            <iframe data-hf-id="hf-sskf" class="b2-iframe" src="../assets/screens/home-light.html" scrolling="no" title="justpercent.com home (light)"></iframe>
            <div data-hf-id="hf-2sdw" class="b2-frame-sheen"></div>
          </div>
        </div>
      </div>
      <div data-hf-id="hf-42sc" class="b2-splats b2-splats-near" id="b2-splats-near"></div>
    </div>

    <style>
      [data-composition-id="b2-home-flythrough"] {
        position: relative; width: 1080px; height: 1920px;
        background: linear-gradient(180deg, #e4e2f1 0%, #dcdaea 55%, #d5d8ec 100%);
        overflow: hidden;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
      }
      [data-composition-id="b2-home-flythrough"] .b2-stage { position: absolute; inset: 0; }
      [data-composition-id="b2-home-flythrough"] .b2-orb { position: absolute; border-radius: 50%; filter: blur(130px); }
      [data-composition-id="b2-home-flythrough"] .b2-orb-a {
        width: 900px; height: 900px; top: -280px; left: -280px; opacity: .75;
        background: radial-gradient(circle, rgba(168,85,247,.35) 0%, rgba(168,85,247,0) 70%);
      }
      [data-composition-id="b2-home-flythrough"] .b2-orb-b {
        width: 820px; height: 820px; bottom: -240px; right: -240px; opacity: .7;
        background: radial-gradient(circle, rgba(34,211,238,.3) 0%, rgba(34,211,238,0) 70%);
      }
      [data-composition-id="b2-home-flythrough"] .b2-splats { position: absolute; inset: 0; pointer-events: none; }
      [data-composition-id="b2-home-flythrough"] .b2-splats-near { z-index: 5; }
      [data-composition-id="b2-home-flythrough"] .b2-splat {
        position: absolute; top: 0; left: 0; border-radius: 50%;
        will-change: transform, opacity;
      }
      [data-composition-id="b2-home-flythrough"] .b2-persp {
        position: absolute; inset: 0; perspective: 1600px; perspective-origin: 50% 42%;
      }
      [data-composition-id="b2-home-flythrough"] .b2-cam {
        position: absolute; inset: 0; transform-style: preserve-3d;
        will-change: transform;
      }
      [data-composition-id="b2-home-flythrough"] .b2-frame {
        position: absolute; left: 27px; top: 170px; width: 1026px; height: 1500px;
        border-radius: 40px; overflow: hidden;
        border: 2px solid rgba(255,255,255,.55);
        box-shadow: 0 50px 120px rgba(31,38,135,.35), 0 8px 30px rgba(31,38,135,.22);
        background: #f8f9fe;
        will-change: transform, opacity, filter;
      }
      [data-composition-id="b2-home-flythrough"] .b2-iframe {
        width: 432px; height: 632px; border: 0;
        transform: scale(2.375); transform-origin: 0 0;
        pointer-events: none;
      }
      [data-composition-id="b2-home-flythrough"] .b2-frame-sheen {
        position: absolute; inset: 0; pointer-events: none;
        background: linear-gradient(115deg, rgba(255,255,255,0) 42%, rgba(255,255,255,.16) 50%, rgba(255,255,255,0) 58%);
        will-change: transform, opacity;
      }
    </style>

    <script>
      (function () {
        var root = document.querySelector('[data-composition-id="b2-home-flythrough"]');
        var beat = 5.8;
        function rnd(i) { var x = Math.sin(i * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

        var frame = root.querySelector('.b2-frame');
        var iframe = root.querySelector('.b2-iframe');
        function doc() { var d = iframe.contentDocument; return d && d.body ? d : null; }
        function taxContainer() {
          var d = doc(); if (!d) return null;
          var conts = d.querySelectorAll('#solution-mobile-grid .solution-note-container');
          for (var i = 0; i < conts.length; i++) if (/Calculate the total price with Sales Tax/.test(conts[i].textContent)) return conts[i];
          return null;
        }
        function taxCard() {
          var c = taxContainer();
          return c ? c.querySelector('.solution-sticky-note') : null;
        }
        function taxCta() {
          var c = taxContainer();
          return c ? c.querySelector('.solution-cta-button') : null;
        }
        // idempotent in-page touch indicator, anchored to the sales-tax CTA
        function touchDot() {
          var d = doc(); if (!d) return null;
          var t = d.getElementById('gsm-touch');
          if (!t) {
            var cta = taxCta(); if (!cta) return null;
            var r = cta.getBoundingClientRect();
            t = d.createElement('div');
            t.id = 'gsm-touch';
            t.style.cssText = 'position:absolute;width:56px;height:56px;border-radius:50%;' +
              'background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,255,255,.25) 55%, rgba(255,255,255,0) 72%);' +
              'box-shadow:0 0 0 2px rgba(124,58,237,.5), 0 6px 18px rgba(0,0,0,.3);' +
              'pointer-events:none;z-index:99999;opacity:0;' +
              'left:' + (r.left + d.defaultView.scrollX + r.width * 0.72 - 28) + 'px;' +
              'top:' + (r.top + d.defaultView.scrollY + r.height * 0.5 - 28) + 'px;';
            d.body.appendChild(t);
          }
          return t;
        }

        // ------- splat layers -------
        function makeSplats(holder, n, seed, big) {
          var palette = ['rgba(168,85,247,', 'rgba(124,58,237,', 'rgba(34,211,238,', 'rgba(255,255,255,'];
          var arr = [];
          for (var i = 0; i < n; i++) {
            var d = document.createElement('div');
            d.className = 'b2-splat';
            var s = (big ? 26 : 12) + rnd(i + seed) * (big ? 90 : 46);
            var c = palette[i % palette.length];
            d.style.width = s + 'px'; d.style.height = s + 'px';
            d.style.background = 'radial-gradient(circle, ' + c + (0.35 + rnd(i + seed + 7) * 0.45).toFixed(2) + ') 0%, ' + c + '0) 70%)';
            holder.appendChild(d);
            arr.push(d);
          }
          return arr;
        }
        var far = makeSplats(root.querySelector('#b2-splats-far'), 46, 100, false);
        var near = makeSplats(root.querySelector('#b2-splats-near'), 34, 300, true);

        var tl = gsap.timeline({ paused: true });

        tl.fromTo(root.querySelector('.b2-orb-a'), { x: -20 }, { x: 25, duration: beat, ease: 'sine.inOut' }, 0);
        tl.fromTo(root.querySelector('.b2-orb-b'), { x: 20 }, { x: -25, duration: beat, ease: 'sine.inOut' }, 0);

        // splats converge from the edges onto the frame, then drift as parallax dust
        far.forEach(function (el, i) {
          tl.fromTo(el,
            { x: 540 + (rnd(i + 501) - 0.5) * 1500, y: 960 + (rnd(i + 601) - 0.5) * 2400, opacity: 0, scale: 1.8 },
            { x: 120 + rnd(i + 701) * 840, y: 240 + rnd(i + 801) * 1450, opacity: 0.5, scale: 0.7, duration: 0.9, ease: 'power3.out' }, rnd(i + 21) * 0.25);
          tl.to(el, { y: '-=' + (30 + rnd(i + 31) * 60), opacity: 0.22, duration: beat - 1.4, ease: 'none' }, 1.1);
        });
        near.forEach(function (el, i) {
          tl.fromTo(el,
            { x: 540 + (rnd(i + 111) - 0.5) * 1700, y: 960 + (rnd(i + 211) - 0.5) * 2600, opacity: 0, scale: 2.4 },
            { x: -60 + rnd(i + 311) * 1200, y: -40 + rnd(i + 411) * 2000, opacity: 0.32, scale: 1, duration: 1.0, ease: 'power3.out' }, rnd(i + 41) * 0.3);
          tl.to(el, { y: '+=' + (40 + rnd(i + 51) * 80), opacity: 0.1, duration: beat - 1.5, ease: 'none' }, 1.2);
        });

        // frame materializes out of the splat fog (gaussian condensation)
        tl.fromTo(frame,
          { opacity: 0, filter: 'blur(30px) saturate(1.8)', scale: 0.9, y: 60 },
          { opacity: 1, filter: 'blur(0px) saturate(1)', scale: 1, y: 0, duration: 0.85, ease: 'power2.out' }, 0.15);
        tl.fromTo(root.querySelector('.b2-frame-sheen'),
          { xPercent: -120, opacity: 0.9 }, { xPercent: 120, opacity: 0.4, duration: 1.1, ease: 'power2.inOut' }, 0.35);

        // 3D camera fly-through (impossible-dolly feel)
        tl.fromTo(root.querySelector('.b2-cam'),
          { rotateY: -9, rotateX: 5, z: -260, y: 26 },
          { rotateY: 4, rotateX: -2, z: -20, y: -14, duration: 4.4, ease: 'sine.inOut' }, 0.3);
        tl.to(root.querySelector('.b2-cam'),
          { rotateY: 0, rotateX: 0, z: 130, duration: 1.1, ease: 'power2.in' }, beat - 1.1);

        // page scroll: hero -> search -> sales-tax solution card (settles fully)
        var P = { y: 0 };
        function applyScroll() { var d = doc(); if (d) d.defaultView.scrollTo(0, P.y); }
        tl.fromTo(P, { y: 0 }, { y: 0, duration: 0.6, ease: 'none', onUpdate: applyScroll }, 0);
        tl.to(P, { y: 358, duration: 2.1, ease: 'power2.inOut', onUpdate: applyScroll }, 0.9);

        // spotlight the sales-tax card ("In-store shopping? Calculate the total price with Sales Tax.")
        var H = { k: 0 };
        function applyHighlight() {
          var card = taxCard(); if (!card) return;
          var k = H.k;
          card.style.boxShadow = '0 0 0 ' + (k * 3.2).toFixed(2) + 'px rgba(124,58,237,' + (0.72 * k).toFixed(3) + '), 0 10px 30px rgba(124,58,237,' + (0.4 * k).toFixed(3) + ')';
          card.style.transform = 'scale(' + (1 + 0.028 * k).toFixed(4) + ')';
          card.style.zIndex = 20;
          card.style.position = 'relative';
        }
        tl.fromTo(H, { k: 0 }, { k: 0, duration: 3.0, ease: 'none', onUpdate: applyHighlight }, 0);
        tl.to(H, { k: 1, duration: 0.5, ease: 'power2.out', onUpdate: applyHighlight }, 3.15);

        // touch indicator lands on the CTA and taps it
        var T = { o: 0, s: 1, r: 0 };
        function applyTouch() {
          var t = touchDot(); if (!t) return;
          t.style.opacity = T.o.toFixed(3);
          t.style.transform = 'scale(' + T.s.toFixed(3) + ')';
          t.style.boxShadow = '0 0 0 ' + (2 + T.r * 26) + 'px rgba(124,58,237,' + (0.5 * Math.max(0, 1 - T.r)).toFixed(3) + '), 0 6px 18px rgba(0,0,0,.3)';
          var cta = taxCta();
          if (cta) cta.style.filter = 'brightness(' + (1 + 0.35 * T.r * (1 - T.r) * 4) + ')';
        }
        tl.fromTo(T, { o: 0, s: 1, r: 0 }, { o: 0, duration: 3.8, ease: 'none', onUpdate: applyTouch }, 0);
        tl.to(T, { o: 1, s: 1, duration: 0.3, ease: 'power2.out', onUpdate: applyTouch }, 3.95);
        tl.to(T, { s: 0.72, duration: 0.14, ease: 'power2.in', onUpdate: applyTouch }, 4.35);
        tl.to(T, { s: 1.15, r: 1, o: 0, duration: 0.5, ease: 'power2.out', onUpdate: applyTouch }, 4.49);

        // exit: hallucinatory bloom into the next scene
        tl.to(frame, { filter: 'blur(24px) saturate(2.2) hue-rotate(14deg)', scale: 1.08, opacity: 0, duration: 0.5, ease: 'power2.in' }, beat - 0.5);

        window.__timelines = window.__timelines || {};
        window.__timelines['b2-home-flythrough'] = tl;
      })();
    </script>
  </div>
</template>
