     Open via file://. Controls: Space pause · R restart · theme toggle.
     URL: ?t=<ms> seek · ?stop=<ms> autopause · ?rec hide controls · ?theme=light · ?pause
     QA hook: window.__f7Seek(seconds, "dark"|"light") -> Promise (frames decoded)

<style>

<body>

<script src="configs.js"></script>
<script src="geometry.js"></script>
<script>
(() => {
  const CFG = window.F7, GEO = window.F7GEO;
  const Q = new URLSearchParams(location.search);
  const REC = Q.has("rec");
  let THEME = Q.get("theme") === "light" ? "light" : "dark";
  const D = CFG.meta.duration * 1000;
  const K = CFG.meta.cssToStage;

  // ---------- helpers ----------
  const $ = (id) => document.getElementById(id);
  const clamp01 = (v) => Math.max(0, Math.min(1, v));
  const lerp = (a, b, u) => a + (b - a) * u;
  const norm = (t, a, b) => clamp01((t - a) / (b - a));
  const EASE = {
    l: (u) => u,
    i: (u) => u * u * u,
    o: (u) => 1 - Math.pow(1 - u, 3),
    io: (u) => (u < .5 ? 4 * u * u * u : 1 - Math.pow(-2 * u + 2, 3) / 2)
  };
  const rnd = (i) => {
    const v = Math.sin(i * 127.1 + 311.7) * 43758.5453;
    return v - Math.floor(v);
  };

  // ---------- plates ----------
  const PLATES = [
    "home-full", "calc-full", "calc-plate",
    "search-s", "search-sa", "search-sal", "search-sale",
    "key-p2", "key-p25", "key-n8", "key-n80",
    "pu-plate", "pu-pinned-plate", "faq-hub-plate", "faq-page-plate"
  ];
  // shot plate name → asset base name
  const PLATE_SRC = {
    "home-full": "home-full", "calc-full": "calc-full", "calc-plate": "calc-plate",
    "search-s": "search-s", "search-sa": "search-sa", "search-sal": "search-sal",
    "search-sale": "search-sale", "key-p2": "key-p2", "key-p25": "key-p25",
    "key-n8": "key-n8", "key-n80": "key-n80", "pu-plate": "pu-plate",
    "pu-pinned": "pu-pinned-plate", "faq-hub": "faq-hub-plate",
    "faq-page": "faq-page-plate"
  };
  const world = $("world");
  const plateEls = {};
  for (const name of Object.values(PLATE_SRC)) {
    if (plateEls[name]) continue;
    const img = document.createElement("img");
    img.id = "pl-" + name;
    world.appendChild(img);
    plateEls[name] = img;
  }

  // ---------- geometry anchors (stage px) ----------
  let A = {}, PH = {}; // anchors, plate heights (stage px)
  const rx = (o) => o && ({ x: o.x * K, y: o.y * K, w: o.w * K, h: o.h * K });
  const center = (r) => r && ({ cx: r.x + r.w / 2, cy: r.y + r.h / 2 });
  function rebuildAnchors() {
    const g = GEO[THEME];
    const wrongCtaFull = g.home.wrong.cta && {
      x: g.home.wrong.cta.x, y: g.home.wrong.cta.y + g.home.wrong.scrollY,
      w: g.home.wrong.cta.w, h: g.home.wrong.cta.h
    };
    const rightCtaFull = g.home.right.cta && {
      x: g.home.right.cta.x, y: g.home.right.cta.y + g.home.right.scrollY,
      w: g.home.right.cta.w, h: g.home.right.cta.h
    };
    const lastState = g.search.states[g.search.states.length - 1];
    A = {
      search: rx(g.home.search),
      searchBox: rx(lastState.box),
      dropdown: rx(lastState.dropdown) ||
        rx({ x: 16, y: lastState.box.y + lastState.box.h + 8, w: 400, h: 420 }),
      dropdownMatch: rx(g.search.verified.matchRect),
      cardWrong: rx(g.home.wrong.full),
      cardRight: rx(g.home.right.full),
      cardWrongCta: rx(wrongCtaFull),
      cardRightCta: rx(rightCtaFull),
      pxInput: rx(g.calc.px),
      numInput: rx(g.calc.num),
      calcResultFull: rx(g.calc.result),
      puAreaFull: { x: 0, y: (g.pu.scrollY + 220) * K, w: 1080, h: 900 },
      puResult: rx(g.pu.result),
      puRow: rx(g.pu.clickedRow)
    };
    PH = {
      "home-full": g.home.pageH * K,
      "calc-full": g.calc.pageH * K
    };
    for (const name of Object.values(PLATE_SRC))
      if (!(name in PH) || !PH[name]) PH[name] = 1920;
    PH["calc-full"] = g.calc.pageH * K;
    PH["home-full"] = g.home.pageH * K;
  }

  // ---------- camera ----------
  function resolvePose(p, plate) {
    let cx = p.cx, cy = p.cy;
    if (p.anchor) {
      const r = A[p.anchor];
      const c = center(r) || { cx: 540, cy: 960 };
      cx = c.cx; cy = c.cy;
    }
    const z = p.z || 1, rot = p.rot || 0;
    // keep the view inside the plate
    const ph = PH[PLATE_SRC[plate] || plate] || 1920;
    const hw = 540 / z, hh = 960 / z;
    cx = Math.max(hw, Math.min(1080 - hw, cx));
    cy = Math.max(hh, Math.min(ph - hh, cy));
    return { cx, cy, z, rot };
  }
  const shotAt = (t) => {
    const s = CFG.shots;
    for (const sh of s) if (t >= sh.t0 && t < sh.t1) return sh;
    return s[s.length - 1];
  };
  function camAt(t) {
    const sh = shotAt(t);
    if (!sh.plate) return { shot: sh, pose: null };
    const u = EASE[sh.ease || "io"](norm(t, sh.t0, sh.t1));
    const a = resolvePose(sh.from, sh.plate);
    const b = resolvePose(sh.to, sh.plate);
    return {
      shot: sh,
      pose: {
        cx: lerp(a.cx, b.cx, u), cy: lerp(a.cy, b.cy, u),
        z: lerp(a.z, b.z, u), rot: lerp(a.rot, b.rot, u)
      }
    };
  }
  // plate point → stage px under a pose
  function toStage(pose, x, y) {
    const rad = (pose.rot * Math.PI) / 180;
    const dx = (x - pose.cx) * pose.z, dy = (y - pose.cy) * pose.z;
    return {
      x: 540 + dx * Math.cos(rad) - dy * Math.sin(rad),
      y: 960 + dx * Math.sin(rad) + dy * Math.cos(rad)
    };
  }

  // ---------- element handles / static copy ----------
  const frame = $("frame");
  const flash = $("flash"), chroma = $("chroma"), speedLines = $("speedLines");
  const roastBorder = $("roastBorder"), stamp = $("stamp"), stampSub = $("stampSub");
  const glitch = [$("g0"), $("g1"), $("g2")];
  const quest = $("quest"), toast = $("toast");
  const minimap = $("minimap"), mmImg = $("mmImg"), mmView = $("mmView"), mmDot = $("mmDot");
  const facecam = $("facecam"), fcVid = $("fcVid"), fcSlot = $("fcSlot");
  const cursor = $("cursor"), pressRing = $("pressRing"), matchRing = $("matchRing");
  const ecBg = $("ecBg"), ecMark = $("ecMark"), ecBrand = $("ecBrand");
  const ecTag = $("ecTag"), ecPills = $("ecPills");
  const urlPill = $("urlPill"), urlText = $("urlText");

  $("chipL1").textContent = `TECHNIQUE ${CFG.meta.id}/7 · ${CFG.meta.technique}`;
  $("chipL2").textContent = CFG.meta.detail;
  stamp.textContent = CFG.roast.stamp;
  stampSub.textContent = CFG.roast.sub;
  toast.textContent = CFG.achievement.text;
  ecBrand.textContent = CFG.endCopy.brand;
  ecTag.textContent = CFG.endCopy.tagline;
  urlText.textContent = CFG.endCopy.url;
  for (const p of CFG.endCopy.pills) {
    const d = document.createElement("div");
    d.className = "ecPill"; d.textContent = p;
    ecPills.appendChild(d);
  }
  const EC = CFG.endcard;
  ecMark.style.top = EC.markY + "px";
  ecBrand.style.top = EC.brandY + "px";
  ecTag.style.top = EC.tagY + "px";
  ecPills.style.top = EC.pillsY + "px";
  const UP = EC.urlPill;
  urlPill.style.left = (UP.cx - UP.w / 2) + "px";
  urlPill.style.top = (UP.cy - UP.h / 2) + "px";
  urlPill.style.width = UP.w + "px"; urlPill.style.height = UP.h + "px";
  urlPill.style.borderRadius = UP.br + "px";
  urlText.style.fontSize = UP.font + "px";

  const FC = CFG.facecam;
  facecam.style.left = FC.x + "px"; facecam.style.top = FC.y + "px";
  facecam.style.width = FC.w + "px"; facecam.style.height = FC.h + "px";
  facecam.style.borderRadius = FC.br + "px";
  const MM = CFG.minimap;
  minimap.style.left = MM.x + "px"; minimap.style.top = MM.y + "px";
  minimap.style.width = MM.w + "px"; minimap.style.height = MM.h + "px";
  minimap.style.borderRadius = MM.br + "px";

  // quest items
  const qiEls = CFG.quest.items.map((it) => {
    const d = document.createElement("div");
    d.className = "qi";
    d.innerHTML = `<span class="qb">☐</span> <span class="ql">${it.label}</span>`;
    quest.appendChild(d);
    return d;
  });

  // XP popup elements
  const xpEls = CFG.xp.map((ev) => {
    const d = document.createElement("div");
    d.className = "xp"; d.textContent = ev.text;
    frame.insertBefore(d, $("flash"));
    return d;
  });

  // ---------- theme / assets ----------
  const imgRecs = [];
  for (const name of Object.values(PLATE_SRC)) {
    if (imgRecs.some((r) => r.name === name)) continue;
    imgRecs.push({ name, el: plateEls[name], src: (t) => `assets/${name}-${t}.png` });
  }
  let videoOk = false;
  fcVid.addEventListener("loadeddata", () => { videoOk = true; renderFrame(curT()); });
  fcVid.addEventListener("error", () => { videoOk = false; });

  function setTheme(t) {
    THEME = t;
    document.body.classList.toggle("theme-light", t === "light");
    $("btnTheme").textContent = t === "dark" ? "☀️ Light" : "🌙 Dark";
    rebuildAnchors();
    for (const rec of imgRecs) rec.el.src = rec.src(t);
    return Promise.all(imgRecs.map((r) => r.el.decode().catch(() => {})));
  }

  // ---------- render (pure function of t) ----------
  const capEl = $("cap"), capBig = $("capBig"), capSub = $("capSub");
  const DT = 1 / 30;

  function renderFrame(ms) {
    const t = ms / 1000;
    const frameIdx = Math.floor(t * 30);
    const { shot, pose } = camAt(t);

    // backdrop drift (subtle)
    $("orbA").style.transform =
      `translate(${-160 + Math.sin(t * 0.21) * 90}px, ${140 + Math.cos(t * 0.42) * 110}px)`;
    $("orbB").style.transform =
      `translate(${520 + Math.cos(t * 0.21) * 110}px, ${1160 + Math.sin(t * 0.42) * 130}px)`;

    // ---- world / plates ----
    const activeName = shot.plate ? PLATE_SRC[shot.plate] : null;
    for (const name in plateEls)
      plateEls[name].style.display = name === activeName ? "block" : "none";

    let camSpeed = 0;
    if (pose) {
      // roast shake (deterministic per frame)
      let shx = 0, shy = 0;
      const RO = CFG.roast;
      if (t >= RO.t0 && t < RO.t1 + 0.12) {
        shx = (rnd(frameIdx * 3 + 1) - 0.5) * 16;
        shy = (rnd(frameIdx * 7 + 4) - 0.5) * 16;
      }
      world.style.display = "block";
      world.style.transform =
        `translate(${540 + shx}px, ${960 + shy}px) rotate(${pose.rot}deg) ` +
        `scale(${pose.z}) translate(${-pose.cx}px, ${-pose.cy}px)`;
      // camera speed for FPV garnish (finite difference, pure in t)
      const prev = camAt(Math.max(0, t - DT));
      if (prev.pose && prev.shot === shot) {
        camSpeed = Math.hypot(pose.cx - prev.pose.cx, pose.cy - prev.pose.cy) / DT * pose.z;
      }
      // whip = motion blur
      const isWhip = !!shot.whip;
      world.style.filter = isWhip
        ? `blur(${(6 * Math.sin(Math.PI * norm(t, shot.t0, shot.t1))).toFixed(1)}px)`
        : "";
    } else {
      world.style.display = "none";
    }
    const sl = clamp01((camSpeed - CFG.fpv.speedLineFrom) / 1400);
    speedLines.style.opacity = (sl * 0.85).toFixed(2);

    // ---- punch FX (flash + chromatic edge) ----
    let flashOp = 0, chromaOp = 0;
    for (const sh of CFG.shots) {
      if (sh.fx === "punch") {
        const dt = t - sh.t0;
        if (dt >= 0 && dt < 2 / 30) flashOp = Math.max(flashOp, 1);
        else if (dt >= 2 / 30 && dt < 4 / 30) flashOp = Math.max(flashOp, 1 - (dt - 2 / 30) * 15);
        if (dt >= 0 && dt < 4 / 30) chromaOp = Math.max(chromaOp, 1 - dt * 5);
      }
      if (sh.fx === "flashEnd") {
        const dt = t - sh.t1;
        if (dt >= -1 / 30 && dt < 2 / 30) flashOp = Math.max(flashOp, 1);
        else if (dt >= 2 / 30 && dt < 5 / 30) flashOp = Math.max(flashOp, 1 - (dt - 2 / 30) * 12);
      }
    }
    flash.style.opacity = flashOp;
    chroma.style.opacity = chromaOp;

    // ---- error roast ----
    {
      const RO = CFG.roast;
      const on = t >= RO.t0 && t < RO.t1 + 0.3;
      const flick = on ? (0.55 + 0.45 * Math.sin(t * 55)) : 0;
      roastBorder.style.opacity = t >= RO.t0 && t < RO.t1 + 0.15 ? flick : 0;
      const gOn = t >= RO.t0 && t < RO.t1;
      glitch.forEach((g, i) => {
        g.style.display = gOn ? "block" : "none";
        if (gOn) {
          g.style.top = Math.floor(rnd(frameIdx * 5 + i * 17) * 1800) + "px";
          g.style.transform = `translateX(${(rnd(frameIdx * 9 + i * 31) - 0.5) * 90}px)`;
          g.style.opacity = 0.25 + rnd(frameIdx * 13 + i * 7) * 0.4;
        }
      });
      const sOn = t >= RO.t0 && t < RO.t1 + 0.28;
      stamp.style.display = sOn ? "block" : "none";
      stampSub.style.display = sOn ? "block" : "none";
      if (sOn) {
        const inU = EASE.o(norm(t, RO.t0, RO.t0 + 0.12));
        stamp.style.transform =
          `translate(-50%, -50%) rotate(-8deg) scale(${lerp(1.7, 1, inU)})`;
        stamp.style.opacity = inU;
        stampSub.style.opacity = EASE.o(norm(t, RO.t0 + 0.08, RO.t0 + 0.2));
      }
    }

    // ---- quest log ----
    {
      const qs = CFG.quest;
      const on = t >= qs.spawn;
      quest.style.display = on ? "block" : "none";
      if (on) {
        const inU = EASE.o(norm(t, qs.spawn, qs.spawn + 0.4));
        // endcard: drop below the achievement toast (no HUD overlap)
        quest.style.top = (190 + 170 * EASE.io(norm(t, EC.t0, EC.t0 + 0.7))) + "px";
        quest.style.transform = `translateX(${(1 - inU) * 120}px)`;
        quest.style.opacity = inU;
        qs.items.forEach((it, i) => {
          const done = t >= it.check;
          qiEls[i].classList.toggle("done", done);
          qiEls[i].querySelector(".qb").textContent = done ? "☑" : "☐";
          const pop = done ? 1 + 0.25 * Math.max(0, 1 - (t - it.check) / 0.35) : 1;
          qiEls[i].style.transform = `scale(${pop})`;
          qiEls[i].style.transformOrigin = "left center";
        });
      }
    }

    // ---- XP popups ----
    CFG.xp.forEach((ev, i) => {
      const el = xpEls[i];
      const dt = t - ev.t;
      const on = dt >= 0 && dt < 1.4;
      el.style.display = on ? "block" : "none";
      if (on && pose) {
        const r = A[ev.anchor];
        const c = center(r) || { cx: 540, cy: 960 };
        const p = toStage(pose, c.cx, c.cy);
        const spring = dt < 0.3
          ? 0.5 + 1.05 * EASE.o(dt / 0.3) - 0.35 * Math.max(0, 1 - Math.abs(dt - 0.34) / 0.14)
          : 1;
        el.style.left = Math.max(230, Math.min(850, p.x)) + "px";
        el.style.top = (Math.max(300, Math.min(1450, p.y)) - 90 - dt * 55) + "px";
        el.style.transform = `translate(-50%, -50%) scale(${spring})`;
        el.style.opacity = dt < 1.0 ? 1 : 1 - (dt - 1.0) / 0.4;
      }
    });

    // ---- achievement toast ----
    {
      const dt = t - CFG.achievement.t;
      const on = dt >= 0;
      toast.style.display = on ? "block" : "none";
      if (on) {
        const inU = EASE.o(norm(t, CFG.achievement.t, CFG.achievement.t + 0.5));
        toast.style.transform =
          `translate(-50%, -50%) translateY(${(1 - inU) * -140}px) scale(${lerp(0.8, 1, inU)})`;
        toast.style.opacity = inU;
      }
    }

    // ---- cursor + presses + match ring ----
    {
      let cx = null, cy = null, op = 0;
      const kf = CFG.cursor;
      for (let i = 0; i < kf.length - 1; i++) {
        const a = kf[i], b = kf[i + 1];
        if (t >= a.t && t <= b.t) {
          const u = EASE.io(norm(t, a.t, b.t));
          const ra = center(A[a.anchor]) || { cx: 540, cy: 960 };
          const rb = center(A[b.anchor]) || ra;
          cx = lerp(ra.cx + a.dx, rb.cx + b.dx, u);
          cy = lerp(ra.cy + a.dy, rb.cy + b.dy, u);
          op = lerp(a.op, b.op, u);
          break;
        }
      }
      if (cx != null && op > 0.02 && pose) {
        const p = toStage(pose, cx, cy);
        cursor.style.display = "block";
        cursor.style.left = p.x + "px"; cursor.style.top = p.y + "px";
        cursor.style.opacity = op;
      } else cursor.style.display = "none";

      let pr = null;
      for (const ps of CFG.presses) {
        const dt = t - ps.t;
        if (dt >= 0 && dt < 0.4) { pr = { ps, dt }; break; }
      }
      if (pr && pose) {
        const c = center(A[pr.ps.anchor]) || { cx: 540, cy: 960 };
        const p = toStage(pose, c.cx, c.cy);
        const d = lerp(30, 190, EASE.o(pr.dt / 0.4));
        pressRing.style.display = "block";
        pressRing.style.left = p.x + "px"; pressRing.style.top = p.y + "px";
        pressRing.style.width = d + "px"; pressRing.style.height = d + "px";
        pressRing.style.opacity = 1 - pr.dt / 0.4;
      } else pressRing.style.display = "none";

      const MR = CFG.matchRing;
      const mOn = t >= MR.t0 && t <= MR.t1 && pose;
      matchRing.style.display = mOn ? "block" : "none";
      if (mOn) {
        const r = A[MR.anchor];
        if (r) {
          const p0 = toStage(pose, r.x, r.y);
          matchRing.style.left = p0.x + "px";
          matchRing.style.top = p0.y + "px";
          matchRing.style.width = (r.w * pose.z) + "px";
          matchRing.style.height = (r.h * pose.z) + "px";
          matchRing.style.opacity =
            Math.min(EASE.o(norm(t, MR.t0, MR.t0 + 0.25)),
                     0.6 + 0.4 * Math.sin(t * 9));
        }
      }
    }

    // ---- minimap (mirrors the FPV camera on the current plate) ----
    {
      const on = pose && t < EC.t0;
      minimap.style.display = on ? "block" : "none";
      if (on) {
        const src = `assets/${activeName}-${THEME}.png`;
        if (mmImg.dataset.src !== src) { mmImg.src = src; mmImg.dataset.src = src; }
        const ph = PH[activeName] || 1920;
        const dx = pose.cx / 1080, dy = pose.cy / ph;
        mmDot.style.left = (dx * MM.w) + "px";
        mmDot.style.top = (dy * MM.h) + "px";
        const vw = Math.min(1, 1080 / pose.z / 1080) * MM.w;
        const vh = Math.min(1, 1920 / pose.z / ph) * MM.h;
        mmView.style.left = (dx * MM.w - vw / 2) + "px";
        mmView.style.top = (dy * MM.h - vh / 2) + "px";
        mmView.style.width = vw + "px"; mmView.style.height = vh + "px";
      }
    }

    // ---- facecam ----
    {
      facecam.style.display = "block";
      fcVid.style.display = videoOk ? "block" : "none";
      fcSlot.style.display = videoOk ? "none" : "grid";
      // endcard: glide to the free top-left column (under the chip) so the
      // tagline, pills and caption stay clear
      const up = EASE.io(norm(t, EC.t0, EC.t0 + 0.7));
      facecam.style.left = lerp(FC.x, 40, up) + "px";
      facecam.style.top = lerp(FC.y, 400, up) + "px";
      const beat = t >= 26.6 && t < 29.4 ? 1.06 : 1; // the final-beat nudge
      facecam.style.transform = `scale(${beat})`;
      facecam.style.transformOrigin = "100% 100%";
    }

    // ---- endcard ----
    if (t >= EC.t0) {
      const bgIn = EASE.o(norm(t, EC.t0, EC.t0 + 0.6));
      ecBg.style.display = "block";
      ecBg.style.opacity = bgIn * 0.97;
      const els = [ecMark, ecBrand, ecTag, ecPills];
      els.forEach((el, i) => {
        const inU = EASE.o(norm(t, EC.stagger + i * 0.14, EC.stagger + i * 0.14 + 0.55));
        el.style.opacity = inU;
        el.style.display = inU > 0.01 ? (el === ecPills ? "flex" : "block") : "none";
        el.style.transform = `translate(-50%, -50%) translateY(${(1 - inU) * 60}px)`;
      });
      const pillU = EASE.o(norm(t, EC.stagger + 0.7, EC.stagger + 1.25));
      urlPill.style.display = pillU > 0.01 ? "block" : "none";
      urlPill.style.opacity = pillU;
      urlPill.style.transform = `scale(${lerp(0.9, 1, pillU)})`;
    } else {
      ecBg.style.display = "none";
      urlPill.style.display = "none";
      [ecMark, ecBrand, ecTag, ecPills].forEach((el) => { el.style.display = "none"; });
    }

    // ---- captions ----
    let cap = null;
    for (const c of CFG.captions) if (t >= c.t0 && t <= c.t1) { cap = c; break; }
    if (cap) {
      const inU = EASE.o(norm(t, cap.t0, cap.t0 + 0.22));
      const outU = EASE.i(clamp01((cap.t1 - t) / 0.2));
      capEl.style.opacity = Math.min(inU, outU);
      capEl.style.transform = `translateX(-50%) translateY(${(1 - inU) * 42}px)`;
      if (capBig.textContent !== cap.big) {
        capBig.textContent = cap.big; capSub.textContent = cap.sub;
        capSub.style.display = cap.sub ? "" : "none";
      }
    } else capEl.style.opacity = 0;

    syncVideo(t);
  }

  // ---------- facecam transport (slaved to the master clock) ----------
  function syncVideo(t) {
    if (!videoOk) return;
    const want = Math.max(0, Math.min(CFG.clip.dur - 0.04, t - CFG.clip.start));
    if (playing) {
      if (fcVid.paused) { try { fcVid.currentTime = want; fcVid.play().catch(() => {}); } catch {} }
      else if (Math.abs(fcVid.currentTime - want) > 0.15) fcVid.currentTime = want;
    } else {
      if (!fcVid.paused) fcVid.pause();
      if (Math.abs(fcVid.currentTime - want) > 0.02) {
        try { fcVid.currentTime = want; } catch {}
      }
    }
  }
  const videoSeeked = (v) => new Promise((res) => {
    if (!videoOk || v.readyState < 2) return res();
    const to = setTimeout(done, 800);
    function done() { clearTimeout(to); v.removeEventListener("seeked", done); res(); }
    if (v.seeking) v.addEventListener("seeked", done); else done();
  });

  // ---------- master clock ----------
  let playing = false, t0 = 0, tAcc = 0, stopAt = null;
  const now = () => performance.now();
  const curT = () => (playing ? Math.min(D, tAcc + now() - t0) : tAcc);
  function seek(ms) { tAcc = Math.max(0, Math.min(D, ms)); t0 = now(); renderFrame(tAcc); sync(); }
  function play() {
    if (playing) return;
    if (tAcc >= D) tAcc = 0;
    playing = true; t0 = now(); $("btnPlay").textContent = "⏸ Pause"; tick();
  }
  function pause() {
    tAcc = curT(); playing = false; $("btnPlay").textContent = "▶ Play";
    if (videoOk && !fcVid.paused) fcVid.pause();
  }
  function tick() {
    if (!playing) return;
    const t = curT();
    renderFrame(t); sync();
    if (stopAt != null && t >= stopAt) { stopAt = null; pause(); return; }
    if (t >= D) { pause(); return; }
    requestAnimationFrame(tick);
  }
  function sync() {
    const t = curT();
    $("scrub").value = t; $("tlabel").textContent = (t / 1000).toFixed(2) + "s";
  }

  // ---------- controls ----------
  $("btnPlay").onclick = () => (playing ? pause() : play());
  $("btnRestart").onclick = () => { pause(); seek(0); };
  $("btnTheme").onclick = () => setTheme(THEME === "dark" ? "light" : "dark")
    .then(() => renderFrame(curT()));
  $("scrub").oninput = (e) => { pause(); seek(+e.target.value); };
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); playing ? pause() : play(); }
    if (e.key === "r" || e.key === "R") { pause(); seek(0); }
  });
  if (REC) $("controls").style.display = "none";

  // fit stage to window
  function fit() {
    const s = Math.min(innerWidth / 1080, innerHeight / 1920);
    frame.style.transform = `translate(-50%,-50%) scale(${s})`;
    frame.style.transformOrigin = "center center";
  }
  addEventListener("resize", fit); fit();

  // QA hook
  window.__f7Seek = async (sec, theme) => {
    if (theme && theme !== THEME) await setTheme(theme);
    pause(); seek(sec * 1000);
    if (videoOk) {
      const want = Math.max(0, Math.min(CFG.clip.dur - 0.04, sec - CFG.clip.start));
      try { fcVid.currentTime = want; } catch {}
      await videoSeeked(fcVid);
    }
    await Promise.all(imgRecs.map((r) => r.el.decode().catch(() => {})));
    await mmImg.decode().catch(() => {});
    renderFrame(sec * 1000);
    return true;
  };

  // ---------- boot ----------
  setTheme(THEME).then(() => {
    $("loading").style.display = "none";
    const tq = Q.get("t"), stq = Q.get("stop");
    if (stq) stopAt = +stq;
    seek(tq ? +tq : 0);
    if (!tq || stq) { if (!Q.has("pause")) play(); }
  });
})();
</script>
</body>
</html>
