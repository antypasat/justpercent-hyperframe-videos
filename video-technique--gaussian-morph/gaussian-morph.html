<!doctype html>
<!-- Film 6 — Gaussian Splatting & AI Morphing — justpercent.com (US)
     Deterministic master-clock player: every pixel is a pure function of t.
     Open via file://. Controls: Space pause · R restart · theme toggle.
     URL: ?t=<ms> seek · ?stop=<ms> autopause · ?rec hide controls · ?theme=light · ?pause
     QA hook: window.__f6Seek(seconds, "dark"|"light") -> Promise (frames decoded)
     ZERO HARD CUTS: pages are frozen splat clouds (14.4k gaussian points from
     capture.mjs grids); scenes dissolve and re-condense into each other while
     one continuous camera dollies through the frozen moments. Crisp PNG plates
     crossfade in whenever the real UI must be readable. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Film 6 — Gaussian Splatting &amp; AI Morphing — Just Percent</title>
<style>
  @font-face { font-family: "Space Grotesk"; font-weight: 700;
    src: url("fonts/space-grotesk-latin-700-normal.woff2") format("woff2"); }
  @font-face { font-family: "Space Grotesk"; font-weight: 500;
    src: url("fonts/space-grotesk-latin-500-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Sans"; font-weight: 300;
    src: url("fonts/ibm-plex-sans-latin-300-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Sans"; font-weight: 400;
    src: url("fonts/ibm-plex-sans-latin-400-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Sans"; font-weight: 600;
    src: url("fonts/ibm-plex-sans-latin-600-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Sans"; font-weight: 700;
    src: url("fonts/ibm-plex-sans-latin-700-normal.woff2") format("woff2"); }
  @font-face { font-family: "JetBrains Mono"; font-weight: 400;
    src: url("fonts/jetbrains-mono-latin-400-normal.woff2") format("woff2"); }
  @font-face { font-family: "JetBrains Mono"; font-weight: 700;
    src: url("fonts/jetbrains-mono-latin-700-normal.woff2") format("woff2"); }

  html, body { margin: 0; height: 100%; background: #05060d; overflow: hidden;
    font-family: "IBM Plex Sans", sans-serif; }
  #viewport { position: fixed; inset: 0; display: grid; place-items: center; }

  /* ---- 1080×1920 stage ---- */
  #frame { position: absolute; left: 50%; top: 50%;
    width: 1080px; height: 1920px; overflow: hidden;
    border-radius: 8px; transform-origin: center center; background: #070812; }
  .theme-light #frame { background: #dcdaea; }

  /* void backdrop */
  #bgfx { position: absolute; inset: -60px; }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); }
  #orbA { width: 880px; height: 880px; background: rgba(124, 58, 237, .32); }
  #orbB { width: 740px; height: 740px; background: rgba(34, 211, 238, .16); }
  .theme-light #orbA { background: rgba(139, 92, 246, .33); }
  .theme-light #orbB { background: rgba(96, 165, 250, .28); }
  .dot { position: absolute; border-radius: 50%; background: #cdd3ff; filter: blur(1px); }
  .theme-light .dot { background: #6d5fd0; }
  #vignette { position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 50% 47%, transparent 55%, rgba(2,3,8,.5) 100%); }
  .theme-light #vignette {
    background: radial-gradient(120% 90% at 50% 47%, transparent 60%, rgba(30,20,70,.24) 100%); }

  /* ---- splat canvas (the heart of the film) ---- */
  #splats { position: absolute; left: 0; top: 0; width: 1080px; height: 1920px; }

  /* crisp page plates (legibility crossfades; camera-projected) */
  .plate { position: absolute; left: 0; top: 0; width: 1080px; height: 1920px;
    transform-origin: 0 0; opacity: 0; display: none;
    will-change: transform, opacity; -webkit-user-drag: none; }

  /* lifted card crop + punched result crop */
  #cardCrop, #resultCrop { position: absolute; transform-origin: 0 0; opacity: 0;
    display: none; -webkit-user-drag: none; border-radius: 18px;
    box-shadow: 0 34px 80px rgba(2, 4, 14, .5); }
  .theme-light #cardCrop, .theme-light #resultCrop {
    box-shadow: 0 34px 80px rgba(40, 30, 90, .3); }

  /* intro video placeholder card (house pattern) */
  #introCard { position: absolute; overflow: hidden; display: none;
    background: #0c0f22; border-radius: 40px;
    box-shadow: 0 44px 110px rgba(2, 4, 14, .6); }
  .theme-light #introCard { background: #eceaf6;
    box-shadow: 0 44px 110px rgba(40, 30, 90, .34); }
  #introCard video { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; }
  #slot { position: absolute; inset: 26px; border: 6px dashed rgba(255,255,255,.45);
    border-radius: 28px; display: grid; place-items: center; text-align: center; }
  .theme-light #slot { border-color: rgba(30, 22, 80, .45); }
  #slot .l1 { font-family: "JetBrains Mono"; font-weight: 700; font-size: 30px;
    color: rgba(255,255,255,.85); letter-spacing: 1px; }
  #slot .l2 { font-family: "JetBrains Mono"; font-weight: 400; font-size: 21px;
    color: rgba(255,255,255,.55); margin-top: 12px; }
  .theme-light #slot .l1 { color: rgba(25, 18, 70, .85); }
  .theme-light #slot .l2 { color: rgba(25, 18, 70, .55); }

  /* endcard (house family) */
  #ecBg { position: absolute; inset: -90px; display: none;
    background: linear-gradient(180deg, rgba(7,8,18,.92), rgba(11,8,30,.97)); }
  .theme-light #ecBg {
    background: linear-gradient(180deg, rgba(226,224,240,.94), rgba(212,208,236,.97)); }
  .ec { position: absolute; left: 540px; transform: translate(-50%, -50%);
    text-align: center; display: none; white-space: nowrap; }
  #ecMark { width: 170px; height: 170px; }
  #ecBrand { font-family: "Space Grotesk"; font-weight: 700; font-size: 92px;
    color: #fff; }
  .theme-light #ecBrand { color: #17123a; }
  #ecTag { font-size: 36px; color: rgba(255,255,255,.78); }
  .theme-light #ecTag { color: rgba(23, 18, 58, .78); }
  #ecPills { display: none; position: absolute; left: 540px;
    transform: translate(-50%, -50%); gap: 22px; }
  .ecPill { font-size: 30px; font-weight: 600; color: #e9e6ff;
    border: 1px solid rgba(255,255,255,.28); border-radius: 40px; padding: 12px 34px;
    white-space: nowrap; }
  .theme-light .ecPill { color: #2a2260; border-color: rgba(35, 25, 95, .3); }
  #urlPill { position: absolute; display: none; background: #fff;
    box-shadow: 0 24px 70px rgba(2, 4, 14, .5); }
  #urlPill span { position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%); font-family: "JetBrains Mono";
    font-weight: 700; color: #0b0c18; white-space: nowrap; }

  /* captions — white text on a translucent dark plate (both themes) */
  #cap { position: absolute; left: 50%; top: 1560px; transform: translateX(-50%);
    width: 940px; text-align: center; opacity: 0; }
  #capPlate { display: inline-block; background: rgba(8,10,22,.74);
    border: 1px solid rgba(255,255,255,.14); border-radius: 26px;
    padding: 28px 44px; backdrop-filter: blur(6px); }
  #capBig { font-family: "Space Grotesk"; font-weight: 700; font-size: 56px;
    line-height: 1.08; color: #fff; letter-spacing: .5px; }
  #capSub { font-family: "IBM Plex Sans"; font-weight: 300; font-size: 33px;
    color: rgba(255,255,255,.82); margin-top: 10px; }

  /* technique chip */
  #chip { position: absolute; left: 40px; top: 40px; background: rgba(8,10,22,.55);
    border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 16px 22px; }
  #chipL1 { font-family: "JetBrains Mono"; font-weight: 700; font-size: 24px;
    color: rgba(255,255,255,.82); letter-spacing: 1px; }
  #chipL2 { font-family: "JetBrains Mono"; font-weight: 400; font-size: 21px;
    color: rgba(255,255,255,.5); margin-top: 5px; }

  /* controls (never recorded: hidden by ?rec) */
  #controls { position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center; background: rgba(10,12,26,.85);
    border: 1px solid rgba(255,255,255,.15); border-radius: 14px; padding: 10px 14px;
    z-index: 50; color: #cfd3ec; font-size: 14px; }
  #controls button { background: #262a4a; color: #e8eaff; border: 0; border-radius: 9px;
    padding: 8px 14px; font-size: 14px; cursor: pointer; font-family: inherit; }
  #controls input[type=range] { width: 260px; accent-color: #8b5cf6; }
  #loading { position: fixed; inset: 0; display: grid; place-items: center;
    background: #05060d; color: #aab; z-index: 90; font-size: 18px;
    font-family: "JetBrains Mono", monospace; }
</style>
</head>
<body>
<div id="viewport">
  <div id="frame">
    <div id="bgfx"><div class="orb" id="orbA"></div><div class="orb" id="orbB"></div></div>
    <div id="vignette"></div>

    <canvas id="splats" width="1080" height="1920"></canvas>

    <img class="plate" id="plateHome" alt="">
    <img class="plate" id="plateGrid" alt="">
    <img class="plate" id="plateCalc" alt="">
    <img class="plate" id="platePu" alt="">
    <img class="plate" id="platePinned" alt="">
    <img class="plate" id="plateFaq" alt="">
    <img id="cardCrop" alt="">
    <img id="resultCrop" alt="">

    <div id="introCard">
      <video id="stillVid" muted playsinline preload="auto"
        src="assets/product-still.mp4"></video>
      <div id="slot"><div>
        <div class="l1">VIDEO PLACEHOLDER</div>
        <div class="l2">drop assets/product-still.mp4</div>
      </div></div>
    </div>

    <div id="ecBg"></div>
    <img class="ec" id="ecMark" src="assets/logo-percentage.png" alt="Just Percent logo" />
    <div class="ec" id="ecBrand"></div>
    <div class="ec" id="ecTag"></div>
    <div id="ecPills"></div>
    <div id="urlPill"><span id="urlText"></span></div>

    <div id="cap"><div id="capPlate">
      <div id="capBig"></div><div id="capSub"></div>
    </div></div>
    <div id="chip"><div id="chipL1"></div><div id="chipL2"></div></div>
  </div>
</div>

<div id="controls">
  <button id="btnPlay">▶ Play</button>
  <button id="btnRestart">↺</button>
  <button id="btnTheme">☀️ Light</button>
  <input type="range" id="scrub" min="0" max="30000" value="0" step="33">
  <span id="tlabel">0.00s</span>
</div>
<div id="loading">loading frames…</div>

<script src="configs.js"></script>
<script src="geometry.js"></script>
<script src="splats.js"></script>
<script>
(() => {
  const CFG = window.F6, GEO = window.F6GEO, SPL = window.F6SPLATS;
  const Q = new URLSearchParams(location.search);
  const REC = Q.has("rec");
  let THEME = Q.get("theme") === "light" ? "light" : "dark";
  const D = CFG.meta.duration * 1000;
  const K = CFG.meta.cssToStage;
  const SP = CFG.splat, MO = CFG.morphs, EC = CFG.endcard, IN = CFG.intro;

  // ---------- helpers ----------
  const $ = (id) => document.getElementById(id);
  const clamp01 = (v) => Math.max(0, Math.min(1, v));
  const lerp = (a, b, u) => a + (b - a) * u;
  const norm = (t, a, b) => clamp01((t - a) / (b - a));
  const EASE = {
    i: (u) => u * u * u,
    o: (u) => 1 - Math.pow(1 - u, 3),
    io: (u) => (u < .5 ? 4 * u * u * u : 1 - Math.pow(-2 * u + 2, 3) / 2)
  };
  const rnd = (i) => {
    const v = Math.sin(i * 127.1 + 311.7) * 43758.5453;
    return v - Math.floor(v);
  };

  // ---------- splat clouds (from capture.mjs grids) ----------
  const SCENES = ["home", "home-grid", "calc", "pu", "pu-pinned", "faq"];
  const COLS = 90, ROWS = 160, N = COLS * ROWS;
  const GX = new Float32Array(N), GY = new Float32Array(N);
  const JIT = new Float32Array(N), SJ = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    GX[i] = ((i % COLS) + 0.5) * 12;
    GY[i] = (Math.floor(i / COLS) + 0.5) * 12;
    JIT[i] = (rnd(i * 3 + 1) - 0.5) * 2;         // depth jitter −1..1
    SJ[i] = 0.85 + rnd(i * 7 + 5) * 0.3;         // size jitter
  }
  // per-theme: rgb + lum + depth per scene
  let CLOUD = {};
  function buildClouds(theme) {
    CLOUD = {};
    for (const sc of SCENES) {
      const g = SPL[theme][sc];
      const bin = atob(g.rgbB64);
      const rgb = new Uint8ClampedArray(N * 3);
      const lum = new Float32Array(N), z = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        const r = bin.charCodeAt(i * 3), gg = bin.charCodeAt(i * 3 + 1),
              b = bin.charCodeAt(i * 3 + 2);
        rgb[i * 3] = r; rgb[i * 3 + 1] = gg; rgb[i * 3 + 2] = b;
        const L = (0.2126 * r + 0.7152 * gg + 0.0722 * b) / 255;
        lum[i] = L;
        z[i] = lerp(SP.zNear, SP.zFar, 1 - L) + JIT[i] * SP.zJitter;
      }
      CLOUD[sc] = { rgb, lum, z };
    }
  }

  // sprite cache: 4-bit-RGB-keyed pre-rasterized radial-gradient sprites.
  // ponytail: generalizes the "8 tint buckets" hint to 4-bit RGB buckets so
  // assembled clouds stay pixel-faithful; still zero gradients created per
  // point per frame (cache hit after first appearance of a color).
  let SPRITES = new Map();
  function sprite(r, g, b) {
    const key = ((r >> 4) << 8) | ((g >> 4) << 4) | (b >> 4);
    let cv = SPRITES.get(key);
    if (!cv) {
      cv = document.createElement("canvas");
      cv.width = cv.height = 32;
      const cx = cv.getContext("2d");
      const rr = (r >> 4) * 17, gg = (g >> 4) * 17, bb = (b >> 4) * 17;
      const grad = cx.createRadialGradient(16, 16, 0, 16, 16, 16);
      grad.addColorStop(0, `rgba(${rr},${gg},${bb},1)`);
      grad.addColorStop(0.55, `rgba(${rr},${gg},${bb},.72)`);
      grad.addColorStop(1, `rgba(${rr},${gg},${bb},0)`);
      cx.fillStyle = grad;
      cx.fillRect(0, 0, 32, 32);
      SPRITES.set(key, cv);
    }
    return cv;
  }

  // "%" glyph hallucination targets — sampled once from a rendered mask on the
  // same 90×160 grid (deterministic: bundled font, fonts.ready awaited at boot)
  const GLX = new Float32Array(N), GLY = new Float32Array(N);
  function buildGlyph() {
    const cv = document.createElement("canvas");
    cv.width = 1080; cv.height = 1920;
    const cx = cv.getContext("2d", { willReadFrequently: true });
    cx.fillStyle = "#000"; cx.fillRect(0, 0, 1080, 1920);
    cx.fillStyle = "#fff";
    cx.font = `700 ${MO.glyph.fontPx}px "Space Grotesk"`;
    cx.textAlign = "center"; cx.textBaseline = "middle";
    cx.fillText("%", MO.glyph.cx, MO.glyph.cy);
    const data = cx.getImageData(0, 0, 1080, 1920).data;
    const cells = [];
    for (let i = 0; i < N; i++) {
      const x = Math.round(GX[i]), y = Math.round(GY[i]);
      if (data[(y * 1080 + x) * 4] > 128) cells.push(i);
    }
    for (let i = 0; i < N; i++) {
      const c = cells.length ? cells[Math.floor(rnd(i * 11 + 3) * cells.length)] : i;
      GLX[i] = GX[c] + (rnd(i * 13 + 9) - 0.5) * 10;
      GLY[i] = GY[c] + (rnd(i * 17 + 2) - 0.5) * 10;
    }
  }
  // brand-gradient tint (violet → cyan by y) for the hallucination moment
  const tintR = (y) => lerp(167, 34, y / 1920);
  const tintG = (y) => lerp(139, 211, y / 1920);
  const tintB = (y) => lerp(250, 238, y / 1920);

  // ---------- camera ----------
  function camAt(t) {
    const kf = CFG.camera;
    if (t <= kf[0].t) return kf[0];
    for (let i = 0; i < kf.length - 1; i++) {
      const a = kf[i], b = kf[i + 1];
      if (t >= a.t && t <= b.t) {
        const u = EASE.io(norm(t, a.t, b.t));
        return { x: lerp(a.x, b.x, u), y: lerp(a.y, b.y, u), z: lerp(a.z, b.z, u) };
      }
    }
    return kf[kf.length - 1];
  }
  // world (stage px, depth z) → screen; s < 0 ⇒ behind camera
  const proj = (x, y, z, cam) => {
    const denom = SP.fov + z - cam.z;
    const s = SP.fov / denom;
    return { x: (x - 540 - cam.x) * s + 540, y: (y - 960 - cam.y) * s + 960, s, denom };
  };
  // flat z=0 plane transform for DOM plates
  function plateTransform(cam) {
    const s = SP.fov / (SP.fov - cam.z);
    return { s, tx: 540 - (540 + cam.x) * s, ty: 960 - (960 + cam.y) * s };
  }

  // ---------- per-morph stagger fields ----------
  const cssRect = (r) => ({ x: r.x * K, y: r.y * K, w: r.w * K, h: r.h * K });
  let R = {}; // theme-dependent stage-px rects
  function rebuildRects() {
    const g = GEO[THEME];
    R.card = cssRect(g.home.card.rect);
    R.cardClip = cssRect(g.home.cardClip);
    R.result = cssRect(g.pu.result);
    R.resultClip = cssRect(g.pu.resultClip);
  }
  function staggerOf(seg, i) {
    const j = rnd(i * 5 + 21) * 0.15;
    if (seg.lift) { // card leads, the rest trails
      const cx = R.card.x + R.card.w / 2, cy = R.card.y + R.card.h / 2;
      const inCard = GX[i] > R.card.x && GX[i] < R.card.x + R.card.w &&
                     GY[i] > R.card.y && GY[i] < R.card.y + R.card.h;
      if (inCard) return j * 0.6;
      const d = Math.hypot(GX[i] - cx, GY[i] - cy) / 1900;
      return 0.18 + d * (MO.staggerSpread - 0.18) + j;
    }
    if (seg.swirl) {
      const d = Math.hypot(GX[i] - (R.result.x + R.result.w / 2),
                           GY[i] - (R.result.y + R.result.h / 2)) / 1900;
      return d * MO.staggerSpread * 0.7 + j;
    }
    if (seg.glyph) {
      const d = Math.hypot(GX[i] - 540, GY[i] - 960) / 1100;
      return d * MO.staggerSpread * 0.6 + j;
    }
    // dolly / default: top-to-bottom wave
    return (GY[i] / 1920) * (MO.staggerSpread - 0.15) + j;
  }

  // ---------- element handles ----------
  const frame = $("frame");
  const canvas = $("splats"), ctx2d = canvas.getContext("2d");
  const plates = {
    home: $("plateHome"), "home-grid": $("plateGrid"), calc: $("plateCalc"),
    pu: $("platePu"), "pu-pinned": $("platePinned"), faq: $("plateFaq")
  };
  const cardCrop = $("cardCrop"), resultCrop = $("resultCrop");
  const introCard = $("introCard"), stillVid = $("stillVid"), slot = $("slot");
  const ecBg = $("ecBg"), ecMark = $("ecMark"), ecBrand = $("ecBrand");
  const ecTag = $("ecTag"), ecPills = $("ecPills");
  const urlPill = $("urlPill"), urlText = $("urlText");

  const imgs = [
    { el: plates.home, src: (t) => `assets/home-plate-${t}.png` },
    { el: plates["home-grid"], src: (t) => `assets/home-grid-plate-${t}.png` },
    { el: plates.calc, src: (t) => `assets/calc-plate-${t}.png` },
    { el: plates.pu, src: (t) => `assets/pu-plate-${t}.png` },
    { el: plates["pu-pinned"], src: (t) => `assets/pu-pinned-plate-${t}.png` },
    { el: plates.faq, src: (t) => `assets/faq-plate-${t}.png` },
    { el: cardCrop, src: (t) => `assets/card-${t}.png` },
    { el: resultCrop, src: (t) => `assets/result-field-${t}.png` }
  ];

  let videoOk = false;
  stillVid.addEventListener("loadeddata", () => { videoOk = true; renderFrame(curT()); });
  stillVid.addEventListener("error", () => { videoOk = false; });

  // particles (ambient void dust)
  const dots = [];
  const W2P = (2 * Math.PI) / CFG.meta.duration;
  for (let i = 0; i < 26; i++) {
    const d = document.createElement("div");
    d.className = "dot";
    const s = 3 + rnd(i) * 6;
    d.style.width = d.style.height = s + "px";
    $("bgfx").appendChild(d);
    dots.push({ el: d, x: rnd(i + 50) * 1080, y0: rnd(i + 99) * 2040,
      n: 1 + Math.floor(rnd(i + 7) * 2), m: 1 + Math.floor(rnd(i + 3) * 3),
      ph: rnd(i + 31) * 6.28 });
  }

  // chip + endcard copy
  $("chipL1").textContent = `TECHNIQUE ${CFG.meta.id}/7 · ${CFG.meta.technique}`;
  $("chipL2").textContent = CFG.meta.detail;
  ecBrand.textContent = CFG.endCopy.brand;
  ecTag.textContent = CFG.endCopy.tagline;
  urlText.textContent = CFG.endCopy.url;
  for (const p of CFG.endCopy.pills) {
    const d = document.createElement("div");
    d.className = "ecPill"; d.textContent = p;
    ecPills.appendChild(d);
  }
  ecMark.style.top = EC.markY + "px";
  ecBrand.style.top = EC.brandY + "px";
  ecTag.style.top = EC.tagY + "px";
  ecPills.style.top = EC.pillsY + "px";
  const UP = EC.urlPill;
  urlPill.style.left = (UP.cx - UP.w / 2) + "px";
  urlPill.style.top = (UP.cy - UP.h / 2) + "px";
  urlPill.style.width = UP.w + "px"; urlPill.style.height = UP.h + "px";
  urlPill.style.borderRadius = UP.br + "px";
  urlText.style.fontSize = UP.font + "px";
  const IC = IN.card;
  introCard.style.left = (IC.cx - IC.w / 2) + "px";
  introCard.style.top = (IC.cy - IC.h / 2) + "px";
  introCard.style.width = IC.w + "px"; introCard.style.height = IC.h + "px";
  introCard.style.borderRadius = IC.br + "px";

  // ---------- theme ----------
  function setTheme(t) {
    THEME = t;
    document.body.classList.toggle("theme-light", t === "light");
    $("btnTheme").textContent = t === "dark" ? "☀️ Light" : "🌙 Dark";
    rebuildRects();
    buildClouds(t);
    SPRITES = new Map();
    for (const rec of imgs) rec.el.src = rec.src(t);
    return Promise.all(imgs.map((r) => r.el.decode().catch(() => {})));
  }

  // ---------- cloud state per frame ----------
  // scratch buffers (reused every frame — no per-frame allocation)
  const PX = new Float32Array(N), PY = new Float32Array(N), PZ = new Float32Array(N);
  const PA = new Float32Array(N);
  const CR = new Float32Array(N), CG = new Float32Array(N), CB = new Float32Array(N);
  const ORDER = new Uint32Array(N);
  const BUCKETS = 128, HEAD = new Int32Array(BUCKETS), NEXT = new Int32Array(N);

  const segAt = (t) => {
    const s = CFG.segments;
    for (const g of s) if (t >= g.t0 && t < g.t1) return g;
    return s[s.length - 1];
  };

  function cloudFrame(t, seg) {
    const A = seg.mode === "morph" ? CLOUD[seg.a] :
              seg.mode === "endcard" ? CLOUD[seg.from] : CLOUD[seg.scene || "home"];
    if (seg.mode === "intro") { PA.fill(0); return introLeak(t); }

    if (seg.mode === "condense") {
      const S = CLOUD[seg.scene];
      for (let i = 0; i < N; i++) {
        const st = rnd(i * 5 + 21) * 0.9;
        const u = EASE.io(norm(t, seg.t0 + st, seg.t1 - 0.9 + st));
        const ang = rnd(i * 3 + 8) * 6.283, dist = 120 + rnd(i * 9 + 4) * 420;
        const x0 = IC.cx + Math.cos(ang) * dist;
        const y0 = IC.cy + Math.sin(ang) * dist * 1.4;
        const z0 = (rnd(i * 7 + 6) - 0.5) * 640;
        PX[i] = lerp(x0, GX[i], u);
        PY[i] = lerp(y0, GY[i], u);
        PZ[i] = lerp(z0, S.z[i] * (1 - u * u), u); // flattens as it assembles
        PA[i] = SP.alpha * clamp01(u * 3 + 0.08);
        CR[i] = S.rgb[i * 3]; CG[i] = S.rgb[i * 3 + 1]; CB[i] = S.rgb[i * 3 + 2];
      }
      return;
    }

    if (seg.mode === "held") {
      const S = CLOUD[seg.scene];
      // frozen world: exact grid positions; depth breathes back in softly
      const re = EASE.io(norm(t, seg.t0 + 0.3, seg.t1));
      for (let i = 0; i < N; i++) {
        PX[i] = GX[i]; PY[i] = GY[i];
        PZ[i] = S.z[i] * re * 0.35;
        PA[i] = SP.alpha;
        CR[i] = S.rgb[i * 3]; CG[i] = S.rgb[i * 3 + 1]; CB[i] = S.rgb[i * 3 + 2];
      }
      return;
    }

    if (seg.mode === "morph") {
      const Ac = CLOUD[seg.a], Bc = CLOUD[seg.b];
      const dur = seg.t1 - seg.t0;
      // the "%" hallucination is timed GLOBALLY (small per-point jitter only)
      // so the silhouette actually reads mid-morph
      const gw = seg.glyph ? MO.glyph.window : null;
      const g0 = gw ? seg.t0 + gw[0] * dur : 0;
      const g1 = gw ? seg.t0 + gw[1] * dur : 0;
      for (let i = 0; i < N; i++) {
        const st = staggerOf(seg, i);
        const u = EASE.io(norm(t, seg.t0 + st, seg.t1 - (MO.staggerSpread - st) * 0.4));
        const puff = Math.sin(Math.PI * u);
        // seeded curl drift (function of t only — deterministic)
        const ca = rnd(i * 19 + 11) * 6.283, cb = rnd(i * 23 + 17) * 6.283;
        const cx = Math.sin(ca + t * 0.7), cy = Math.cos(cb + t * 0.6);
        let x = GX[i] + cx * MO.scatter * puff;
        let y = GY[i] + cy * MO.scatter * puff * (seg.dolly ? 0.55 : 1);
        let gmix = 0;
        if (gw) {
          const j = rnd(i * 41 + 13) * 0.12;
          gmix = EASE.io(norm(t, g0 - 0.45 + j, g0 + j)) *
                 (1 - EASE.io(norm(t, g1 + j, g1 + 0.45 + j)));
          if (gmix > 0.001) {
            const sh = Math.sin(t * 2.1 + rnd(i) * 6.283) * 7;
            x = lerp(x, GLX[i] + sh * cx, gmix);
            y = lerp(y, GLY[i] + sh * cy, gmix);
          }
        }
        if (seg.swirl) {
          const rx0 = R.result.x + R.result.w / 2, ry0 = R.result.y + R.result.h / 2;
          const dx = x - rx0, dy = y - ry0;
          const a = MO.swirlTurns * Math.PI * puff * (0.4 + rnd(i * 29 + 7) * 0.6);
          const cs = Math.cos(a), sn = Math.sin(a);
          x = rx0 + dx * cs - dy * sn; y = ry0 + dx * sn + dy * cs;
        }
        PX[i] = x; PY[i] = y;
        let z = lerp(Ac.z[i], Bc.z[i], u) * (u < 0.15 ? u / 0.15 : u > 0.85 ? (1 - u) / 0.15 : 1)
              + puff * 150 * JIT[i];
        if (seg.lift) {
          const inCard = GX[i] > R.card.x && GX[i] < R.card.x + R.card.w &&
                         GY[i] > R.card.y && GY[i] < R.card.y + R.card.h;
          if (inCard) z += MO.liftZ * puff;
        }
        if (gmix > 0.001) z = lerp(z, JIT[i] * 30, gmix); // glyph plane flattens
        PZ[i] = z;
        let r = lerp(Ac.rgb[i * 3], Bc.rgb[i * 3], u),
            g = lerp(Ac.rgb[i * 3 + 1], Bc.rgb[i * 3 + 1], u),
            b = lerp(Ac.rgb[i * 3 + 2], Bc.rgb[i * 3 + 2], u);
        if (gmix > 0.001) {
          const tw = MO.glyph.tint * gmix;
          r = lerp(r, tintR(GLY[i]), tw);
          g = lerp(g, tintG(GLY[i]), tw);
          b = lerp(b, tintB(GLY[i]), tw);
        }
        CR[i] = r; CG[i] = g; CB[i] = b;
        PA[i] = SP.alpha;
      }
      return;
    }

    // ---- endcard: collapse + the last splats orbiting the URL pill ----
    {
      const S = CLOUD[seg.from];
      const c0 = EC.collapse[0], c1 = EC.collapse[1];
      const px0 = UP.cx, py0 = UP.cy;
      for (let i = 0; i < N; i++) {
        const orbiter = i % EC.orbit.every === 0;
        if (!orbiter) {
          const st = rnd(i * 5 + 21) * 0.9;
          const u = EASE.i(norm(t, c0 + st, c1 + st * 0.4));
          const sp = 2.5 * u;
          const dx = GX[i] - px0, dy = GY[i] - py0;
          const cs = Math.cos(sp), sn = Math.sin(sp);
          PX[i] = px0 + (dx * cs - dy * sn) * (1 - u * 0.85);
          PY[i] = py0 + (dx * sn + dy * cs) * (1 - u * 0.85);
          PZ[i] = S.z[i] * (1 - u);
          PA[i] = SP.alpha * (1 - u);
          CR[i] = S.rgb[i * 3]; CG[i] = S.rgb[i * 3 + 1]; CB[i] = S.rgb[i * 3 + 2];
        } else {
          const k = Math.floor(i / EC.orbit.every);
          const phi = (k / Math.ceil(N / EC.orbit.every)) * 6.283 + rnd(k) * 0.5;
          const fly = EASE.io(norm(t, c0 + rnd(k * 3) * 0.7, c0 + 1.6));
          const spin = EC.orbit.turns * 6.283 *
            EASE.o(norm(Math.min(t, EC.orbit.freeze), c0 + 0.6, EC.orbit.freeze));
          const a = phi + spin;
          const ox = px0 + Math.cos(a) * EC.orbit.rx,
                oy = py0 + Math.sin(a) * EC.orbit.ry;
          PX[i] = lerp(GX[i], ox, fly);
          PY[i] = lerp(GY[i], oy, fly);
          PZ[i] = lerp(S.z[i], Math.sin(a) * 40, fly);
          PA[i] = SP.alpha * (0.5 + 0.5 * Math.min(1, fly + 0.2));
          const yy = clamp01(Math.sin(a) * 0.5 + 0.5) * 1920;
          CR[i] = lerp(S.rgb[i * 3], tintR(yy), fly);
          CG[i] = lerp(S.rgb[i * 3 + 1], tintG(yy), fly);
          CB[i] = lerp(S.rgb[i * 3 + 2], tintB(yy), fly);
        }
      }
    }
  }

  // intro: splats leak out of the placeholder card's edges (brand-tinted)
  function introLeak(t) {
    const L = IN.leak;
    for (let i = 0; i < N; i++) PA[i] = 0;
    if (t < L.start) return;
    for (let j = 0; j < L.count; j++) {
      const i = Math.floor(rnd(j * 31 + 2) * N);
      // deterministic point on the card perimeter + outward drift
      const p = rnd(j * 13 + 6), per = 2 * (IC.w + IC.h);
      let ex, ey, nx, ny;
      const d = p * per;
      if (d < IC.w) { ex = IC.cx - IC.w / 2 + d; ey = IC.cy - IC.h / 2; nx = 0; ny = -1; }
      else if (d < IC.w + IC.h) { ex = IC.cx + IC.w / 2; ey = IC.cy - IC.h / 2 + (d - IC.w); nx = 1; ny = 0; }
      else if (d < 2 * IC.w + IC.h) { ex = IC.cx + IC.w / 2 - (d - IC.w - IC.h); ey = IC.cy + IC.h / 2; nx = 0; ny = 1; }
      else { ex = IC.cx - IC.w / 2; ey = IC.cy + IC.h / 2 - (d - 2 * IC.w - IC.h); nx = -1; ny = 0; }
      const cyc = (t - L.start) * (0.35 + rnd(j * 7 + 9) * 0.45) + rnd(j * 3 + 4);
      const f = cyc - Math.floor(cyc);
      const reach = L.reach * (0.3 + rnd(j * 17 + 1) * 0.7);
      PX[i] = ex + nx * f * reach + (rnd(j * 23) - 0.5) * 40 * f;
      PY[i] = ey + ny * f * reach + (rnd(j * 29) - 0.5) * 40 * f;
      PZ[i] = (rnd(j * 19 + 8) - 0.5) * 160;
      PA[i] = SP.alpha * Math.sin(Math.PI * f) * 0.55 * norm(t, L.start, L.start + 0.8);
      const yy = rnd(j * 37 + 5) * 1920;
      CR[i] = tintR(yy); CG[i] = tintG(yy); CB[i] = tintB(yy);
    }
  }

  // ---------- crisp plate opacity ----------
  function plateStates(t) {
    const out = {}; // scene → opacity
    const segs = CFG.segments;
    for (let k = 0; k < segs.length; k++) {
      const s = segs[k];
      if (s.mode !== "held" || !s.crisp) continue;
      const on = EASE.io(norm(t, s.crisp[0], s.crisp[1]));
      const off = 1 - EASE.io(norm(t, s.t1, s.t1 + 0.4));
      const op = Math.min(on, off);
      if (op > 0.005) out[s.scene] = Math.max(out[s.scene] || 0, op);
    }
    return out;
  }

  // ---------- render (pure function of t) ----------
  const capEl = $("cap"), capBig = $("capBig"), capSub = $("capSub");

  function renderFrame(ms) {
    const t = ms / 1000;
    const cam = camAt(t);
    const seg = segAt(t);

    // ---- backdrop ----
    $("orbA").style.transform =
      `translate(${-160 + Math.sin(t * W2P) * 90}px, ${140 + Math.cos(t * W2P * 2) * 110}px)`;
    $("orbB").style.transform =
      `translate(${520 + Math.cos(t * W2P) * 110}px, ${1160 + Math.sin(t * W2P * 2) * 130}px)`;
    for (const d of dots) {
      const y = ((d.y0 - t * (2040 * d.n / CFG.meta.duration)) % 2040 + 2040) % 2040 - 60;
      d.el.style.transform = `translate(${d.x}px, ${y}px)`;
      d.el.style.opacity = .16 + .28 * (0.5 + 0.5 * Math.sin(t * W2P * d.m + d.ph));
    }

    // ---- splat cloud ----
    cloudFrame(t, seg);
    // cloud dims while a crisp plate carries legibility
    const pOps = plateStates(t);
    let maxPlate = 0;
    for (const k in pOps) maxPlate = Math.max(maxPlate, pOps[k]);
    const dim = 1 - maxPlate * 0.8;

    ctx2d.clearRect(0, 0, 1080, 1920);
    // z bucket sort, far → near
    HEAD.fill(-1);
    let zMin = 1e9, zMax = -1e9;
    for (let i = 0; i < N; i++) {
      if (PA[i] <= 0.004) continue;
      if (PZ[i] < zMin) zMin = PZ[i];
      if (PZ[i] > zMax) zMax = PZ[i];
    }
    if (zMax >= zMin) {
      const zr = Math.max(1, zMax - zMin);
      for (let i = 0; i < N; i++) {
        if (PA[i] <= 0.004) continue;
        const bIdx = Math.min(BUCKETS - 1,
          Math.max(0, Math.floor((PZ[i] - zMin) / zr * (BUCKETS - 1))));
        NEXT[i] = HEAD[bIdx]; HEAD[bIdx] = i;
      }
      for (let b = BUCKETS - 1; b >= 0; b--) {          // far (large z) first
        for (let i = HEAD[b]; i !== -1; i = NEXT[i]) {
          const p = proj(PX[i], PY[i], PZ[i], cam);
          if (p.denom < SP.cullDenom) continue;
          const r = SP.baseR * p.s * SJ[i] * (0.8 + CLOUD.home.lum[i] * 0.4);
          if (p.x < -r || p.x > 1080 + r || p.y < -r || p.y > 1920 + r) continue;
          ctx2d.globalAlpha = Math.min(1, PA[i] * dim *
            (p.denom < SP.cullDenom * 2 ? (p.denom - SP.cullDenom) / SP.cullDenom : 1));
          ctx2d.drawImage(sprite(CR[i], CG[i], CB[i]),
            p.x - r, p.y - r, r * 2, r * 2);
        }
      }
    }
    ctx2d.globalAlpha = 1;

    // ---- crisp plates (camera-projected, z = 0 plane) ----
    const pt = plateTransform(cam);
    for (const sc in plates) {
      const el = plates[sc];
      const op = pOps[sc] || 0;
      el.style.display = op > 0.005 ? "block" : "none";
      el.style.opacity = op;
      if (op > 0.005)
        el.style.transform = `translate(${pt.tx}px, ${pt.ty}px) scale(${pt.s})`;
    }

    // ---- lifted card crop (start of the grid → calc morph) ----
    {
      const seg5 = CFG.segments[5]; // home-grid → calc
      const u = norm(t, seg5.t0, seg5.t0 + 0.7);
      const vis = t >= seg5.t0 && u < 1;
      cardCrop.style.display = vis ? "block" : "none";
      if (vis) {
        const rc = R.cardClip;
        const lift = EASE.o(u);
        const p = proj(rc.x + rc.w / 2, rc.y + rc.h / 2, -MO.liftZ * 0 - lift * 160, cam);
        const s = p.s * (1 + lift * 0.06);
        cardCrop.style.width = rc.w + "px";
        cardCrop.style.height = rc.h + "px";
        cardCrop.style.transform =
          `translate(${p.x - rc.w * s / 2}px, ${p.y - rc.h * s / 2}px) scale(${s})`;
        cardCrop.style.opacity = 1 - EASE.i(norm(u, 0.45, 1));
      }
    }

    // ---- result crop punched forward in z (pinned hold) ----
    {
      const RP = CFG.resultPunch;
      const vis = t >= RP.t0 && t <= RP.t1 + 0.3;
      resultCrop.style.display = vis ? "block" : "none";
      if (vis) {
        const rc = R.resultClip;
        const inU = EASE.o(norm(t, RP.t0, RP.t0 + RP.inDur));
        const outU = 1 - EASE.i(norm(t, RP.t1 - 0.25, RP.t1 + 0.3));
        const p = proj(rc.x + rc.w / 2, rc.y + rc.h / 2, -120 * inU, cam);
        const s = p.s * lerp(1, RP.scale, inU);
        resultCrop.style.width = rc.w + "px";
        resultCrop.style.height = rc.h + "px";
        resultCrop.style.transform =
          `translate(${p.x - rc.w * s / 2}px, ${p.y - rc.h * s / 2}px) scale(${s})`;
        resultCrop.style.opacity = Math.min(inU, outU);
      }
    }

    // ---- intro placeholder card ----
    {
      const vis = t < IN.dissolve[1];
      introCard.style.display = vis ? "block" : "none";
      if (vis) {
        const inU = EASE.o(norm(t, 0, 0.45));
        const dis = EASE.io(norm(t, IN.dissolve[0], IN.dissolve[1]));
        const bob = Math.sin(t * 2.6) * IN.bobPx;
        introCard.style.transform =
          `translateY(${(1 - inU) * 90 + bob}px) scale(${lerp(0.94, 1, inU) * (1 + dis * 0.07)})`;
        introCard.style.opacity = inU * (1 - dis);
        introCard.style.filter = dis > 0.01 ? `blur(${dis * 9}px)` : "";
        stillVid.style.display = videoOk ? "block" : "none";
        slot.style.display = videoOk ? "none" : "grid";
      }
    }

    // ---- endcard ----
    if (t >= EC.collapse[0]) {
      const bgIn = EASE.o(norm(t, EC.collapse[0] + 0.3, EC.collapse[1]));
      ecBg.style.display = bgIn > 0.01 ? "block" : "none";
      ecBg.style.opacity = bgIn * 0.96;
      const els = [ecMark, ecBrand, ecTag, ecPills];
      els.forEach((el, i) => {
        const inU = EASE.o(norm(t, EC.stagger + i * 0.16, EC.stagger + i * 0.16 + 0.6));
        el.style.opacity = inU;
        el.style.display = inU > 0.01 ? (el === ecPills ? "flex" : "block") : "none";
        el.style.transform = `translate(-50%, -50%) translateY(${(1 - inU) * 60}px)`;
      });
      const pillU = EASE.o(norm(t, EC.stagger + 0.75, EC.stagger + 1.35));
      urlPill.style.display = pillU > 0.01 ? "block" : "none";
      urlPill.style.opacity = pillU;
      urlPill.style.transform = `scale(${lerp(0.9, 1, pillU)})`;
    } else {
      ecBg.style.display = "none";
      urlPill.style.display = "none";
      [ecMark, ecBrand, ecTag, ecPills].forEach((el) => { el.style.display = "none"; });
    }

    // ---- captions ----
    let cap = null;
    for (const c of CFG.captions) if (t >= c.t0 && t <= c.t1) { cap = c; break; }
    if (cap) {
      const inU = EASE.o(norm(t, cap.t0, cap.t0 + 0.3));
      const outU = EASE.i(clamp01((cap.t1 - t) / 0.26));
      capEl.style.opacity = Math.min(inU, outU);
      capEl.style.transform = `translateX(-50%) translateY(${(1 - inU) * 42}px)`;
      if (capBig.textContent !== cap.big) {
        capBig.textContent = cap.big; capSub.textContent = cap.sub;
        capSub.style.display = cap.sub ? "" : "none";
      }
    } else capEl.style.opacity = 0;

    syncVideo(t);
  }

  // ---------- intro clip transport (deterministic) ----------
  function syncVideo(t) {
    if (!videoOk) return;
    const want = Math.max(0, Math.min(CFG.clip.dur - 0.04, t - CFG.clip.start));
    const active = t < IN.dissolve[1] + 0.1;
    if (playing && active) {
      if (stillVid.paused) { try { stillVid.currentTime = want; stillVid.play().catch(() => {}); } catch {} }
      else if (Math.abs(stillVid.currentTime - want) > 0.15) stillVid.currentTime = want;
    } else {
      if (!stillVid.paused) stillVid.pause();
      if (Math.abs(stillVid.currentTime - want) > 0.02) {
        try { stillVid.currentTime = want; } catch {}
      }
    }
  }
  const videoSeeked = (v) => new Promise((res) => {
    if (!videoOk || v.readyState < 2) return res();
    const to = setTimeout(done, 800);
    function done() { clearTimeout(to); v.removeEventListener("seeked", done); res(); }
    if (v.seeking) v.addEventListener("seeked", done); else done();
  });

  // ---------- master clock ----------
  let playing = false, t0 = 0, tAcc = 0, stopAt = null;
  const now = () => performance.now();
  const curT = () => (playing ? Math.min(D, tAcc + now() - t0) : tAcc);
  function seek(ms) { tAcc = Math.max(0, Math.min(D, ms)); t0 = now(); renderFrame(tAcc); sync(); }
  function play() {
    if (playing) return;
    if (tAcc >= D) tAcc = 0;
    playing = true; t0 = now(); $("btnPlay").textContent = "⏸ Pause"; tick();
  }
  function pause() {
    tAcc = curT(); playing = false; $("btnPlay").textContent = "▶ Play";
    if (videoOk && !stillVid.paused) stillVid.pause();
  }
  function tick() {
    if (!playing) return;
    const t = curT();
    renderFrame(t); sync();
    if (stopAt != null && t >= stopAt) { stopAt = null; pause(); return; }
    if (t >= D) { pause(); return; }
    requestAnimationFrame(tick);
  }
  function sync() {
    const t = curT();
    $("scrub").value = t; $("tlabel").textContent = (t / 1000).toFixed(2) + "s";
  }

  // ---------- controls ----------
  $("btnPlay").onclick = () => (playing ? pause() : play());
  $("btnRestart").onclick = () => { pause(); seek(0); };
  $("btnTheme").onclick = () => setTheme(THEME === "dark" ? "light" : "dark")
    .then(() => renderFrame(curT()));
  $("scrub").oninput = (e) => { pause(); seek(+e.target.value); };
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); playing ? pause() : play(); }
    if (e.key === "r" || e.key === "R") { pause(); seek(0); }
  });
  if (REC) $("controls").style.display = "none";

  // fit stage to window
  function fit() {
    const s = Math.min(innerWidth / 1080, innerHeight / 1920);
    frame.style.transform = `translate(-50%,-50%) scale(${s})`;
    frame.style.transformOrigin = "center center";
  }
  addEventListener("resize", fit); fit();

  // QA hook
  window.__f6Seek = async (sec, theme) => {
    if (theme && theme !== THEME) await setTheme(theme);
    pause(); seek(sec * 1000);
    if (videoOk) {
      const want = Math.max(0, Math.min(CFG.clip.dur - 0.04, sec - CFG.clip.start));
      try { stillVid.currentTime = want; } catch {}
      await videoSeeked(stillVid);
    }
    await Promise.all(imgs.map((r) => r.el.decode().catch(() => {})));
    renderFrame(sec * 1000);
    return true;
  };

  // ---------- boot ----------
  document.fonts.ready.then(() => {
    buildGlyph();
    return setTheme(THEME);
  }).then(() => {
    $("loading").style.display = "none";
    const tq = Q.get("t"), stq = Q.get("stop");
    if (stq) stopAt = +stq;
    seek(tq ? +tq : 0);
    if (!tq || stq) { if (!Q.has("pause")) play(); }
  });
})();
</script>
</body>
</html>
