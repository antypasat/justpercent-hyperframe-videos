    <style>
      [data-composition-id="beat-1-hook"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #030712;
        overflow: hidden;
        font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      }
      [data-composition-id="beat-1-hook"] .b1-stage {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="beat-1-hook"] .b1-aurora {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.85;
        will-change: transform;
      }
      [data-composition-id="beat-1-hook"] .b1-aurora-a {
        width: 900px;
        height: 900px;
        top: -200px;
        left: -240px;
        background: radial-gradient(
          circle,
          #3b0764 0%,
          rgba(59, 7, 100, 0) 70%
        );
      }
      [data-composition-id="beat-1-hook"] .b1-aurora-b {
        width: 1100px;
        height: 1100px;
        bottom: -300px;
        right: -260px;
        background: radial-gradient(
          circle,
          #1e1b4b 0%,
          rgba(30, 27, 75, 0) 70%
        );
      }
      [data-composition-id="beat-1-hook"] .b1-noise {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="beat-1-hook"] .b1-pct {
        position: absolute;
        font-family: "JetBrains Mono", monospace;
        font-size: 48px;
        font-weight: 400;
        color: rgba(226, 232, 240, 0.42);
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="beat-1-hook"] .b1-strikes {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      [data-composition-id="beat-1-hook"] .b1-strike {
        stroke: #f87171;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-dasharray: 220;
        stroke-dashoffset: 220;
      }
      [data-composition-id="beat-1-hook"] .b1-headline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 5;
      }
      [data-composition-id="beat-1-hook"] .b1-line {
        display: flex;
        gap: 28px;
        overflow: visible;
      }
      [data-composition-id="beat-1-hook"] .b1-word {
        display: inline-block;
        color: #ffffff;
        font-size: 132px;
        font-weight: 300;
        letter-spacing: -0.045em;
        line-height: 1.05;
        will-change: transform, opacity;
      }
      [data-composition-id="beat-1-hook"] .b1-w4 {
        font-weight: 700;
        color: #ffffff;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var beat = 1.85;

        // Aurora drift (seekable, attached to tl)
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-aurora-a',
          { x: -20, y: 0 },
          { x: 20, y: 30, duration: beat, ease: "sine.inOut" },
          0,
        );
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-aurora-b',
          { x: 20, y: 0 },
          { x: -20, y: -30, duration: beat, ease: "sine.inOut" },
          0,
        );

        // Percentages fade + slow drift down
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-pct',
          { opacity: 0, y: -8 },
          {
            opacity: 1,
            y: 30,
            duration: beat,
            ease: "none",
            stagger: { each: 0.025, from: "random" },
          },
          0,
        );

        // Strikethroughs draw, staggered
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-strike',
          { strokeDashoffset: 220 },
          {
            strokeDashoffset: 0,
            duration: 0.45,
            ease: "power2.out",
            stagger: { each: 0.04 },
          },
          0.3,
        );

        // Headline per-word reveal
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-w1',
          { y: 80, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
          0.45,
        );
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-w2',
          { y: 80, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
          0.62,
        );
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-w3',
          { y: 60, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: "power2.out" },
          0.85,
        );
        tl.fromTo(
          '[data-composition-id="beat-1-hook"] .b1-w4',
          { y: 60, opacity: 0, scale: 1.1 },
          { y: 0, opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.6)" },
          1.0,
        );

        // Exit — velocity matched upward
        tl.to(
          '[data-composition-id="beat-1-hook"] .b1-headline',
          {
            y: -140,
            opacity: 0,
            filter: "blur(20px)",
            duration: 0.33,
            ease: "power2.in",
          },
          beat - 0.33,
        );
        tl.to(
          [
            '[data-composition-id="beat-1-hook"] .b1-noise',
            '[data-composition-id="beat-1-hook"] .b1-strikes',
          ],
          {
            opacity: 0,
            filter: "blur(14px)",
            duration: 0.33,
            ease: "power2.in",
          },
          beat - 0.33,
        );

        window.__timelines["beat-1-hook"] = tl;
      })();
    </script>
  </div>
</template>
