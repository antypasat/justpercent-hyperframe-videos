mi></mrow><mn data-hf-id="hf-97f9">100</mn></mfrac><mo data-hf-id="hf-l3hn" stretchy="false">)</mo></mrow><annotation data-hf-id="hf-qna5" encoding="application/x-tex">\text{New Value} = \text{Original} \times (1 + \frac{\text{Increase}\%}{100})</annotation></semantics></math></span><span data-hf-id="hf-yihx" class="katex-html" aria-hidden="true"><span data-hf-id="hf-39b0" class="base"><span data-hf-id="hf-76cy" class="strut" style="height:0.6944em;"></span><span data-hf-id="hf-kxu0" class="mord text"><span data-hf-id="hf-u7ju" class="mord">New&#160;Value</span></span><span data-hf-id="hf-ycon" class="mspace" style="margin-right:0.2778em;"></span><span data-hf-id="hf-t41i" class="mrel">=</span><span data-hf-id="hf-yqzo" class="mspace" style="margin-right:0.2778em;"></span></span><span data-hf-id="hf-3nm1" class="base"><span data-hf-id="hf-37wu" class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span data-hf-id="hf-7u0w" class="mord text"><span data-hf-id="hf-2un0" class="mord">Original</span></span><span data-hf-id="hf-vvvt" class="mspace" style="margin-right:0.2222em;"></span><span data-hf-id="hf-4nsu" class="mbin">×</span><span data-hf-id="hf-wa6u" class="mspace" style="margin-right:0.2222em;"></span></span><span data-hf-id="hf-41x2" class="base"><span data-hf-id="hf-hbb7" class="strut" style="height:1em;vertical-align:-0.25em;"></span><span data-hf-id="hf-xzxq" class="mopen">(</span><span data-hf-id="hf-tzg6" class="mord">1</span><span data-hf-id="hf-wohv" class="mspace" style="margin-right:0.2222em;"></span><span data-hf-id="hf-vy22" class="mbin">+</span><span data-hf-id="hf-x2sw" class="mspace" style="margin-right:0.2222em;"></span></span><span data-hf-id="hf-4g83" class="base"><span data-hf-id="hf-5ty8" class="strut" style="height:1.264em;vertical-align:-0.345em;"></span><span data-hf-id="hf-sgd9" class="mord"><span data-hf-id="hf-k8hc" class="mopen nulldelimiter"></span><span data-hf-id="hf-oi6a" class="mfrac"><span data-hf-id="hf-4dnn" class="vlist-t vlist-t2"><span data-hf-id="hf-xss1" class="vlist-r"><span data-hf-id="hf-yccq" class="vlist" style="height:0.919em;"><span data-hf-id="hf-no4f" style="top:-2.655em;"><span data-hf-id="hf-lxsg" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-j1w3" class="sizing reset-size6 size3 mtight"><span data-hf-id="hf-751a" class="mord mtight"><span data-hf-id="hf-3vhh" class="mord mtight">100</span></span></span></span><span data-hf-id="hf-ts41" style="top:-3.23em;"><span data-hf-id="hf-j5n9" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-l55c" class="frac-line" style="border-bottom-width:0.04em;"></span></span><span data-hf-id="hf-7jd8" style="top:-3.394em;"><span data-hf-id="hf-jjya" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-m3eb" class="sizing reset-size6 size3 mtight"><span data-hf-id="hf-r7ky" class="mord mtight"><span data-hf-id="hf-t1bf" class="mord text mtight"><span data-hf-id="hf-c4na" class="mord mtight">Increase</span></span><span data-hf-id="hf-uiyp" class="mord mtight">%</span></span></span></span></span><span data-hf-id="hf-nb6y" class="vlist-s">​</span></span><span data-hf-id="hf-y732" class="vlist-r"><span data-hf-id="hf-eqll" class="vlist" style="height:0.345em;"><span data-hf-id="hf-l73p"></span></span></span></span></span><span data-hf-id="hf-yzsk" class="mclose nulldelimiter"></span></span><span data-hf-id="hf-nnvx" class="mclose">)</span></span></span></span></span> </div>  <p data-hf-id="hf-53ki" class="text-gray-700 dark:text-gray-300 mb-2"> Example: What is 100 increased by 25%? </p> <div data-hf-id="hf-4lld" class="my-3 p-3 bg-gray-100 dark:bg-gray-700 rounded text-center overflow-x-auto"> <span data-hf-id="hf-9y2k" class="katex-display"><span data-hf-id="hf-r2ml" class="katex"><span data-hf-id="hf-cq71" class="katex-mathml"><math data-hf-id="hf-3s97" xmlns="http://www.w3.org/1998/Math/MathML"><semantics data-hf-id="hf-rhx3"><mrow data-hf-id="hf-duib"><mn data-hf-id="hf-aecc">100</mn><mo data-hf-id="hf-yoxj">×</mo><mo data-hf-id="hf-evg0" stretchy="false">(</mo><mn data-hf-id="hf-opsk">1</mn><mo data-hf-id="hf-yk7f">+</mo><mfrac data-hf-id="hf-dzdd"><mn data-hf-id="hf-pwa7">25</mn><mn data-hf-id="hf-a01b">100</mn></mfrac><mo data-hf-id="hf-p6ff" stretchy="false">)</mo><mo data-hf-id="hf-ipgw">=</mo><mn data-hf-id="hf-hcj0">125</mn></mrow><annotation data-hf-id="hf-4lgb" encoding="application/x-tex">100 \times (1 + \frac{25}{100}) = 125</annotation></semantics></math></span><span data-hf-id="hf-zpf0" class="katex-html" aria-hidden="true"><span data-hf-id="hf-4uj4" class="base"><span data-hf-id="hf-bkgd" class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span data-hf-id="hf-8gna" class="mord">100</span><span data-hf-id="hf-r47h" class="mspace" style="margin-right:0.2222em;"></span><span data-hf-id="hf-523v" class="mbin">×</span><span data-hf-id="hf-riii" class="mspace" style="margin-right:0.2222em;"></span></span><span data-hf-id="hf-yvxp" class="base"><span data-hf-id="hf-aznn" class="strut" style="height:1em;vertical-align:-0.25em;"></span><span data-hf-id="hf-57oy" class="mopen">(</span><span data-hf-id="hf-udr7" class="mord">1</span><span data-hf-id="hf-607q" class="mspace" style="margin-right:0.2222em;"></span><span data-hf-id="hf-wcd3" class="mbin">+</span><span data-hf-id="hf-5lwp" class="mspace" style="margin-right:0.2222em;"></span></span><span data-hf-id="hf-za8q" class="base"><span data-hf-id="hf-u0jr" class="strut" style="height:1.1901em;vertical-align:-0.345em;"></span><span data-hf-id="hf-v8ig" class="mord"><span data-hf-id="hf-j1k9" class="mopen nulldelimiter"></span><span data-hf-id="hf-owhb" class="mfrac"><span data-hf-id="hf-3zcm" class="vlist-t vlist-t2"><span data-hf-id="hf-x05z" class="vlist-r"><span data-hf-id="hf-j5rt" class="vlist" style="height:0.8451em;"><span data-hf-id="hf-xtun" style="top:-2.655em;"><span data-hf-id="hf-jy9b" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-lp3a" class="sizing reset-size6 size3 mtight"><span data-hf-id="hf-rlvz" class="mord mtight"><span data-hf-id="hf-ol15" class="mord mtight">100</span></span></span></span><span data-hf-id="hf-uz14" style="top:-3.23em;"><span data-hf-id="hf-kckc" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-jy89" class="frac-line" style="border-bottom-width:0.04em;"></span></span><span data-hf-id="hf-1d5w" style="top:-3.394em;"><span data-hf-id="hf-hkf5" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-las9" class="sizing reset-size6 size3 mtight"><span data-hf-id="hf-s070" class="mord mtight"><span data-hf-id="hf-rair" class="mord mtight">25</span></span></span></span></span><span data-hf-id="hf-nphz" class="vlist-s">​</span></span><span data-hf-id="hf-xeh0" class="vlist-r"><span data-hf-id="hf-13x9" class="vlist" style="height:0.345em;"><span data-hf-id="hf-me0s"></span></span></span></span></span><span data-hf-id="hf-xsvh" class="mclose nulldelimiter"></span></span><span data-hf-id="hf-dzs1" class="mclose">)</span><span data-hf-id="hf-z5ap" class="mspace" style="margin-right:0.2778em;"></span><span data-hf-id="hf-tul6" class="mrel">=</span><span data-hf-id="hf-zjlq" class="mspace" style="margin-right:0.2778em;"></span></span><span data-hf-id="hf-3rg6" class="base"><span data-hf-id="hf-cj69" class="strut" style="height:0.6444em;"></span><span data-hf-id="hf-mtyn" class="mord">125</span></span></span></span></span> </div> <p data-hf-id="hf-6b09" class="text-gray-700 dark:text-gray-300">100 plus 25% equals 125.</p>  </div>   </div> </div> </div> </section> <article data-hf-id="hf-p137" class="mt-4 mb-4 sm:mb-8 mx-[8px] sm:mx-0 p-4 liquid-glass-panel text-left"> <h2 data-hf-id="hf-slv6" class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white mb-4"> What Is a Value Increase Calculation? </h2> <div data-hf-id="hf-76dp" class="prose prose-slate dark:prose-invert max-w-none"> <div data-hf-id="hf-6ng8" class="mb-6"> <h3 data-hf-id="hf-pajf" class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2">Definition</h3> <p data-hf-id="hf-zi8a" class="text-gray-700 dark:text-gray-300 leading-relaxed" data-localize-decimals=""> Calculating an increased value means adding a percentage on top of the starting amount. It is the core of markups, sales tax, tips, surcharges, and raises. When a store marks up wholesale cost by 40%, you pay 140% of the base. When a restaurant adds an 18% gratuity, your bill grows by that slice. Thinking in the “after” value helps you plan cash flow, set prices that cover costs plus profit, and understand how small percentages add up over time. It also clarifies the difference between absolute dollars and relative growth: a $5 increase can be tiny on a $500 item (1%) but huge on a $10 item (50%). By framing changes in percent, you keep price moves and rate changes in perspective, spot hidden fees quickly, and communicate totals clearly to customers or teammates. Seeing the factor (like 1.18) also makes it obvious how repeated increases compound—helpful for projecting subscription hikes or multi-year rent escalations. </p> </div> <div data-hf-id="hf-h8nk" class="mb-6"> <h3 data-hf-id="hf-luau" class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2"> Common Applications </h3> <ul data-hf-id="hf-aa66" class="list-disc pl-5 space-y-1 text-gray-700 dark:text-gray-300"> <li data-hf-id="hf-f7jj" data-localize-decimals="">Sales tax and fees: Calculate the final checkout price when state tax and service fees stack on the subtotal.</li><li data-hf-id="hf-lixv" data-localize-decimals="">Retail markups: Set the selling price by adding profit margin to wholesale cost without underpricing.</li><li data-hf-id="hf-qyjb" data-localize-decimals="">Tipping: Add a standard 15%–20% tip and see the exact total before paying the check.</li><li data-hf-id="hf-nbvx" data-localize-decimals="">Project budgeting: Add a 10% contingency buffer to keep projects from going over budget.</li><li data-hf-id="hf-g8v2" data-localize-decimals="">Subscription surcharges: Estimate the new bill when a platform introduces a 12% fee.</li><li data-hf-id="hf-pb4t" data-localize-decimals="">Salary raises: Translate a 4% cost-of-living bump into the exact new paycheck amount.</li> </ul> </div> <div data-hf-id="hf-w8fr"> <h3 data-hf-id="hf-fzt5" class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2"> Mathematical Context </h3> <div data-hf-id="hf-slid" class="mb-3"> <code data-hf-id="hf-8tkg" class="block font-mono text-sm bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100 px-3 py-2 rounded"> Final = Original × (1 + Percent/100) </code> </div> <p data-hf-id="hf-zlfo" class="text-gray-700 dark:text-gray-300 leading-relaxed" data-localize-decimals=""> Use the growth-factor shortcut. A 15% increase on $200 is $200 × 1.15 = $230. This single multiplication is faster and less error-prone than computing the percent amount and adding it. For stacked increases, multiply the factors first (a 10% price bump and then 8% tax uses 1.10 × 1.08). To reverse an increase, divide the final amount by the same factor instead of subtracting, which avoids removing too much. In spreadsheets, chaining factors models scenarios quickly; in mental math, remembering 1.25 for 25% or 1.075 for 7.5% helps you estimate without a calculator. </p> </div> </div> </article> <div data-hf-id="hf-m86p" class="mt-4 mb-4 sm:mb-8 mx-[8px] sm:mx-0 p-4 liquid-glass-panel"> <h3 data-hf-id="hf-0h00" class="text-lg font-medium text-gray-800 dark:text-white mb-2"> Need <a data-hf-id="hf-vhfm" href="../" class="text-blue-600 dark:text-blue-300 hover:underline">more percentage tools</a>?

mo data-hf-id="hf-zvum">×</mo><mo data-hf-id="hf-e2ty" stretchy="false">(</mo><mn data-hf-id="hf-p43l">1</mn><mo data-hf-id="hf-wkoa">+</mo><mfrac data-hf-id="hf-dl2c"><mn data-hf-id="hf-d427">25</mn><mn data-hf-id="hf-bl9f">100</mn></mfrac><mo data-hf-id="hf-odtd" stretchy="false">)</mo><mo data-hf-id="hf-hwuu">=</mo><mn data-hf-id="hf-fqdg">125</mn></mrow><annotation data-hf-id="hf-ewnv" encoding="application/x-tex">100 \times (1 + \frac{25}{100}) = 125</annotation></semantics></math></span><span data-hf-id="hf-03q1" class="katex-html" aria-hidden="true"><span data-hf-id="hf-0kzy" class="base"><span data-hf-id="hf-cd2f" class="strut" style="height:0.7278em;vertical-align:-0.0833em;"></span><span data-hf-id="hf-999c" class="mord">100</span><span data-hf-id="hf-sir1" class="mspace" style="margin-right:0.2222em;"></span><span data-hf-id="hf-32kq" class="mbin">×</span><span data-hf-id="hf-sx22" class="mspace" style="margin-right:0.2222em;"></span></span><span data-hf-id="hf-06ox" class="base"><span data-hf-id="hf-a71l" class="strut" style="height:1em;vertical-align:-0.25em;"></span><span data-hf-id="hf-60b0" class="mopen">(</span><span data-hf-id="hf-se82" class="mord">1</span><span data-hf-id="hf-tbd3" class="mspace" style="margin-right:0.2222em;"></span><span data-hf-id="hf-xja6" class="mbin">+</span><span data-hf-id="hf-tpo4" class="mspace" style="margin-right:0.2222em;"></span></span><span data-hf-id="hf-9765" class="base"><span data-hf-id="hf-30x3" class="strut" style="height:1.1901em;vertical-align:-0.345em;"></span><span data-hf-id="hf-wffj" class="mord"><span data-hf-id="hf-in98" class="mopen nulldelimiter"></span><span data-hf-id="hf-q3ee" class="mfrac"><span data-hf-id="hf-2sfj" class="vlist-t vlist-t2"><span data-hf-id="hf-ed20" class="vlist-r"><span data-hf-id="hf-rnbh" class="vlist" style="height:0.8451em;"><span data-hf-id="hf-sz9h" style="top:-2.655em;"><span data-hf-id="hf-sl15" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-k3v6" class="sizing reset-size6 size3 mtight"><span data-hf-id="hf-t743" class="mord mtight"><span data-hf-id="hf-pdn7" class="mord mtight">100</span></span></span></span><span data-hf-id="hf-s6vx" style="top:-3.23em;"><span data-hf-id="hf-try8" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-jjx8" class="frac-line" style="border-bottom-width:0.04em;"></span></span><span data-hf-id="hf-0kju" style="top:-3.394em;"><span data-hf-id="hf-tdn7" class="pstrut" style="height:3em;"></span><span data-hf-id="hf-jpk5" class="sizing reset-size6 size3 mtight"><span data-hf-id="hf-tlf4" class="mord mtight"><span data-hf-id="hf-tksj" class="mord mtight">25</span></span></span></span></span><span data-hf-id="hf-owf2" class="vlist-s">​</span></span><span data-hf-id="hf-dyqz" class="vlist-r"><span data-hf-id="hf-1wjb" class="vlist" style="height:0.345em;"><span data-hf-id="hf-msbt"></span></span></span></span></span><span data-hf-id="hf-0l0o" class="mclose nulldelimiter"></span></span><span data-hf-id="hf-ese3" class="mclose">)</span><span data-hf-id="hf-orv2" class="mspace" style="margin-right:0.2778em;"></span><span data-hf-id="hf-un78" class="mrel">=</span><span data-hf-id="hf-odk1" class="mspace" style="margin-right:0.2778em;"></span></span><span data-hf-id="hf-9lh6" class="base"><span data-hf-id="hf-dbsb" class="strut" style="height:0.6444em;"></span><span data-hf-id="hf-mxxr" class="mord">125</span></span></span></span></span> </div> <p data-hf-id="hf-s1e5" class="text-gray-700 dark:text-gray-300">100 plus 25% equals 125.</p>  </div>   </div> </div> </div> </section> <article data-hf-id="hf-tnb7" class="mt-4 mb-4 sm:mb-8 mx-[8px] sm:mx-0 p-4 liquid-glass-panel text-left"> <h2 data-hf-id="hf-wk8m" class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white mb-4"> What Is a Value Increase Calculation? </h2> <div data-hf-id="hf-78ld" class="prose prose-slate dark:prose-invert max-w-none"> <div data-hf-id="hf-g1qh" class="mb-6"> <h3 data-hf-id="hf-6ymz" class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2">Definition</h3> <p data-hf-id="hf-m0um" class="text-gray-700 dark:text-gray-300 leading-relaxed" data-localize-decimals=""> Calculating an increased value means adding a percentage on top of the starting amount. It is the core of markups, sales tax, tips, surcharges, and raises. When a store marks up wholesale cost by 40%, you pay 140% of the base. When a restaurant adds an 18% gratuity, your bill grows by that slice. Thinking in the “after” value helps you plan cash flow, set prices that cover costs plus profit, and understand how small percentages add up over time. It also clarifies the difference between absolute dollars and relative growth: a $5 increase can be tiny on a $500 item (1%) but huge on a $10 item (50%). By framing changes in percent, you keep price moves and rate changes in perspective, spot hidden fees quickly, and communicate totals clearly to customers or teammates. Seeing the factor (like 1.18) also makes it obvious how repeated increases compound—helpful for projecting subscription hikes or multi-year rent escalations. </p> </div> <div data-hf-id="hf-gg1i" class="mb-6"> <h3 data-hf-id="hf-ydre" class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2"> Common Applications </h3> <ul data-hf-id="hf-22g2" class="list-disc pl-5 space-y-1 text-gray-700 dark:text-gray-300"> <li data-hf-id="hf-9xxr" data-localize-decimals="">Sales tax and fees: Calculate the final checkout price when state tax and service fees stack on the subtotal.</li><li data-hf-id="hf-hhk3" data-localize-decimals="">Retail markups: Set the selling price by adding profit margin to wholesale cost without underpricing.</li><li data-hf-id="hf-m9uf" data-localize-decimals="">Tipping: Add a standard 15%–20% tip and see the exact total before paying the check.</li><li data-hf-id="hf-sskh" data-localize-decimals="">Project budgeting: Add a 10% contingency buffer to keep projects from going over budget.</li><li data-hf-id="hf-3ete" data-localize-decimals="">Subscription surcharges: Estimate the new bill when a platform introduces a 12% fee.</li><li data-hf-id="hf-pkmp" data-localize-decimals="">Salary raises: Translate a 4% cost-of-living bump into the exact new paycheck amount.</li> </ul> </div> <div data-hf-id="hf-bqh7"> <h3 data-hf-id="hf-8hdp" class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2"> Mathematical Context </h3> <div data-hf-id="hf-jf3t" class="mb-3"> <code data-hf-id="hf-207c" class="block font-mono text-sm bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-100 px-3 py-2 rounded"> Final = Original × (1 + Percent/100) </code> </div> <p data-hf-id="hf-iwl8" class="text-gray-700 dark:text-gray-300 leading-relaxed" data-localize-decimals=""> Use the growth-factor shortcut. A 15% increase on $200 is $200 × 1.15 = $230. This single multiplication is faster and less error-prone than computing the percent amount and adding it. For stacked increases, multiply the factors first (a 10% price bump and then 8% tax uses 1.10 × 1.08). To reverse an increase, divide the final amount by the same factor instead of subtracting, which avoids removing too much. In spreadsheets, chaining factors models scenarios quickly; in mental math, remembering 1.25 for 25% or 1.075 for 7.5% helps you estimate without a calculator. </p> </div> </div> </article> <div data-hf-id="hf-rrol" class="mt-4 mb-4 sm:mb-8 mx-[8px] sm:mx-0 p-4 liquid-glass-panel"> <h3 data-hf-id="hf-myug" class="text-lg font-medium text-gray-800 dark:text-white mb-2"> Need <a data-hf-id="hf-hwme" href="../" class="text-blue-600 dark:text-blue-300 hover:underline">more percentage tools</a>?

    <style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var R = '[data-composition-id="s5-practical"] ';
        var root = document.querySelector(R.trim());
        var tl = gsap.timeline({ paused: true });

        function pageTop(el, stop) {
          var y = 0;
          while (el && el !== stop) { y += el.offsetTop; el = el.offsetParent; }
          return y;
        }

        // ---------- state A: the "Salary Increase" practical-use row ----------
        var offA = root ? root.querySelector('.s5-winA .f-off') : null;
        var offB = root ? root.querySelector('.s5-winB .f-off') : null;
        var inOrig = offB ? offB.querySelector('#increased-value-original-input') : null;
        var inPct = offB ? offB.querySelector('#increased-value-percentage-input') : null;
        var inRes = offB ? offB.querySelector('#increased-value-result') : null;
        // enforce the mandated order: click -> banner visible -> THEN values fill in
        if (inOrig) inOrig.value = '';
        if (inPct) inPct.value = '';
        if (inRes) inRes.value = '';

        var geo = { scrollA: 1050, ok: false };
        function pageLeft(el, stop) {
          var x = 0;
          while (el && el !== stop) { x += el.offsetLeft; el = el.offsetParent; }
          return x;
        }
        function layout() {
          if (offA) {
            var rows = Array.prototype.slice.call(offA.querySelectorAll('.practical-use--interactive'));
            var row = null;
            for (var i = 0; i < rows.length; i++) {
              if (/Salary Increase/.test(rows[i].textContent) && rows[i].offsetParent !== null) { row = rows[i]; break; }
            }
            if (row) {
              geo.ok = true;
              var rTop = pageTop(row, offA);
              geo.scrollA = Math.max(0, rTop - 300);
              var rowX = Math.max(6, pageLeft(row, offA) - 6);
              gsap.set(R + '.s5-ringA', { left: rowX, top: rTop - 6, width: row.offsetWidth + 12, height: row.offsetHeight + 12 });
              var tapX = rowX + 6 + Math.min(row.offsetWidth * 0.5, 190);
              var tapY = rTop + row.offsetHeight / 2;
              gsap.set(R + '.s5-cursor', { left: tapX - 13, top: tapY - 13 });
              gsap.set(R + '.s5-ripple', { left: tapX - 13, top: tapY - 13 });
            }
          }
          if (offB) {
            var banner = null;
            var candidates = Array.prototype.slice.call(offB.querySelectorAll('div,section'));
            for (var j = 0; j < candidates.length; j++) {
              var c = candidates[j];
              if (c.children.length && /SELECTED PRACTICAL USE EXAMPLE/.test(c.textContent) && c.offsetHeight > 40 && c.offsetHeight < 400) {
                banner = c; break;
              }
            }
            if (banner) {
              gsap.set(R + '.s5-ringB', {
                left: Math.max(6, pageLeft(banner, offB) - 6), top: pageTop(banner, offB) - 6,
                width: banner.offsetWidth + 12, height: banner.offsetHeight + 12, borderRadius: 16
              });
            }
          }
        }
        var laidOut = false;
        function tryLayout() {
          if (laidOut) return;
          if (!root || (root.offsetParent === null && root.offsetWidth === 0)) return;
          layout();
          if (geo.ok) { laidOut = true; tl.invalidate(); }
        }
        tryLayout();
        if (document.fonts && document.fonts.ready) document.fonts.ready.then(tryLayout);

        // ================= timeline =================
        // layout sentinel (see s2): retry geometry once the clip is visible
        tl.to({ x: 0 }, { x: 1, duration: 8.8, ease: "none", onUpdate: tryLayout }, 0);

        // entrance out of the flip
        tl.fromTo(R + '.s5-winA',
          { scale: 0.92, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.4, ease: "power2.out", immediateRender: true }, 0.0);
        tl.fromTo(R + '.s5-url', { y: -120, opacity: 0 }, { y: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 0.05);
        tl.fromTo(R + '.s5-winA .f-off',
          { top: function () { return -Math.max(0, geo.scrollA - 260); } },
          { top: function () { return -geo.scrollA; }, duration: 0.7, ease: "power2.inOut", immediateRender: true }, 0.15);

        // caption 1
        tl.fromTo(R + '.s5-cap1', { y: 90, opacity: 0, scale: .92 },
          { y: 0, opacity: 1, scale: 1, duration: 0.3, ease: "back.out(1.6)" }, 0.35);
        tl.to(R + '.s5-cap1', { y: -40, opacity: 0, duration: 0.24, ease: "power2.in" }, 2.1);

        // ring + cursor tap on the practical use row  (a: the CLICK)
        tl.fromTo(R + '.s5-ringA', { opacity: 0, scale: 1.1 }, { opacity: 1, scale: 1, duration: 0.28, ease: "power2.out" }, 0.95);
        tl.fromTo(R + '.s5-cursor', { opacity: 0, x: 170, y: 240 }, { opacity: 1, x: 0, y: 0, duration: 0.7, ease: "power2.inOut" }, 1.0);
        tl.to(R + '.s5-cursor', { scale: 0.82, duration: 0.1, yoyo: true, repeat: 1, ease: "power1.inOut" }, 1.8);
        tl.fromTo(R + '.s5-ripple', { opacity: .9, scale: 1 }, { opacity: 0, scale: 3.4, duration: 0.45, ease: "power2.out" }, 1.85);

        // (b: the app pins the example ABOVE the calculator — state swap A -> B)
        tl.to(R + '.s5-winA', { opacity: 0, y: 26, duration: 0.22, ease: "power1.in" }, 2.18);
        tl.fromTo(R + '.s5-winB', { opacity: 0, y: -26 }, { opacity: 1, y: 0, duration: 0.26, ease: "power2.out", immediateRender: true }, 2.30);
        tl.fromTo(R + '.s5-winB .f-off', { top: 0 }, { top: 0, duration: 0.01 }, 2.30);

        // banner spotlight
        tl.fromTo(R + '.s5-ringB', { opacity: 0, scale: 1.06 }, { opacity: 1, scale: 1, duration: 0.3, ease: "power2.out" }, 2.62);
        tl.to(R + '.s5-ringB', { opacity: 0, duration: 0.3, ease: "power1.in" }, 3.9);

        // caption 2
        tl.fromTo(R + '.s5-cap2', { y: 90, opacity: 0, scale: .92 },
          { y: 0, opacity: 1, scale: 1, duration: 0.3, ease: "back.out(1.6)" }, 2.55);
        tl.to(R + '.s5-cap2', { y: -40, opacity: 0, duration: 0.24, ease: "power2.in" }, 4.35);

        // (c: fields type themselves, answer computes live)
        var typing = { orig: 0, pct: 0, res: 0 };
        if (inOrig) {
          tl.to(typing, {
            orig: 5, duration: 0.9, ease: "none",
            onUpdate: function () { inOrig.value = '50000'.slice(0, Math.round(typing.orig)); }
          }, 4.10);
        }
        if (inPct) {
          tl.to(typing, {
            pct: 1, duration: 0.25, ease: "none",
            onUpdate: function () { inPct.value = '8'.slice(0, Math.round(typing.pct)); }
          }, 5.25);
        }
        if (inRes) {
          tl.to(typing, {
            res: 54000, duration: 0.85, ease: "power2.out",
            onUpdate: function () { var v = Math.round(typing.res / 50) * 50; inRes.value = v <= 0 ? '' : String(v); }
          }, 5.75);
        }

        // caption 3
        tl.fromTo(R + '.s5-cap3', { y: 90, opacity: 0, scale: .92 },
          { y: 0, opacity: 1, scale: 1, duration: 0.3, ease: "back.out(1.6)" }, 4.55);
        tl.to(R + '.s5-cap3', { y: -40, opacity: 0, duration: 0.24, ease: "power2.in" }, 6.35);

        // caption 4 — the money shot, with a font-bend pulse
        tl.fromTo(R + '.s5-cap4', { y: 90, opacity: 0, scale: .9 },
          { y: 0, opacity: 1, scale: 1, duration: 0.34, ease: "back.out(1.8)" }, 6.65);
        tl.fromTo(R + '.s5-cap4 .f-cap-t', { scaleY: 1 }, { scaleY: 1.14, duration: 0.09, yoyo: true, repeat: 1, ease: "power1.inOut" }, 7.0);
        tl.fromTo(R + '.s5-cap4 .f-cap-t', { skewX: 0 }, { skewX: -6, duration: 0.08, yoyo: true, repeat: 1, ease: "power1.inOut" }, 7.2);
        tl.to(R + '.s5-cap4', { y: -40, opacity: 0, duration: 0.24, ease: "power2.in" }, 8.25);

        // exit
        tl.to(R + '.s5-winB', { x: -560, opacity: 0, duration: 0.4, ease: "power2.in" }, 8.35);
        tl.to(R + '.s5-url', { y: -120, opacity: 0, duration: 0.3, ease: "power2.in" }, 8.4);
        tl.set(R + '.s5-flash', { opacity: 1 }, 8.70);
        tl.set(R + '.s5-flash', { opacity: 0 }, 8.78);

        tl.set({}, {}, 8.8);
        window.__timelines["s5-practical"] = tl;
      })();
    </script>
