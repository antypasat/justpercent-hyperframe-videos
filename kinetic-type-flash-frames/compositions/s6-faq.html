ata-hf-id="hf-ov7l" id="raise-display-2">5</span> [X] and $<span data-hf-id="hf-ee0k" id="salary-display-2">4000</span> [Y]. The calculator will determine <span data-hf-id="hf-i1b2" id="raise-display-3">5</span>% of $<span data-hf-id="hf-1uh9" id="salary-display-3">4000</span>.<br data-hf-id="hf-regs"> <em data-hf-id="hf-22qw" class="font-medium pr-1 underline gs-search-ignore">Step 2:</em> Add the raise amount calculated in Step 1 to the current salary.<br data-hf-id="hf-r05r"> <em data-hf-id="hf-642z" class="font-medium pr-1 underline gs-search-ignore">Formula explanation:</em><br data-hf-id="hf-p0mm">
