        var R = '[data-composition-id="s1-hook"] ';

        tl.fromTo(R + '.s1-w1',

          { opacity: 1, scale: 1, rotation: -1.4, duration: 0.36, ease: "back.out(2.2)" }, 1.46);

          { y: 170, opacity: 0, filter: "blur(14px)" },
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.4, ease: "power2.out" }, 2.10);

        // subtle deterministic wobble on the whole stack

        tl.to(R + '.s1-stack', { rotation: 0.4, duration: 0.35, ease: "sine.inOut" }, 2.7);

        tl.set(R + '.s1-fl1', { opacity: 0 }, 3.066);
        tl.set(R + '.s1-fl2', { opacity: 1 }, 3.066);

        tl.set(R + '.s1-fl3', { opacity: 1 }, 3.133);
        tl.set(R + '.s1-fl3', { opacity: 0 }, 3.200);
