<!doctype html>
<!-- Film 1 — Spatial UI & 3D Screencasting — justpercent.com (US)
     Deterministic master-clock player: every pixel is a pure function of t.
     Open via file://. Controls: Space pause · R restart · theme toggle.
     URL: ?t=<ms> seek · ?stop=<ms> autopause · ?rec hide controls · ?theme=light
     QA hook: window.__f1Seek(sec) -> Promise (images decoded) -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Film 1 — Spatial UI &amp; 3D Screencasting — Just Percent</title>
<style>
  @font-face { font-family: "Space Grotesk"; font-weight: 700;
    src: url("fonts/space-grotesk-latin-700-normal.woff2") format("woff2"); }
  @font-face { font-family: "Space Grotesk"; font-weight: 500;
    src: url("fonts/space-grotesk-latin-500-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Sans"; font-weight: 400;
    src: url("fonts/ibm-plex-sans-latin-400-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Sans"; font-weight: 600;
    src: url("fonts/ibm-plex-sans-latin-600-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Sans"; font-weight: 700;
    src: url("fonts/ibm-plex-sans-latin-700-normal.woff2") format("woff2"); }
  @font-face { font-family: "JetBrains Mono"; font-weight: 700;
    src: url("fonts/jetbrains-mono-latin-700-normal.woff2") format("woff2"); }

  html, body { margin: 0; height: 100%; background: #05060d; overflow: hidden;
    font-family: "IBM Plex Sans", sans-serif; }
  #viewport { position: fixed; inset: 0; display: grid; place-items: center; }

  /* ---- 1080×1920 stage ---- */
  #frame { position: absolute; left: 50%; top: 50%;
    width: 1080px; height: 1920px;
    overflow: hidden; border-radius: 8px; transform-origin: center center;
    background: #070812; }

  /* void backdrop */
  #bgfx { position: absolute; inset: -60px; }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); }
  #orbA { width: 900px; height: 900px; background: rgba(124, 58, 237, .34); }
  #orbB { width: 760px; height: 760px; background: rgba(34, 211, 238, .17); }
  .theme-light #frame { background: #d9d7e8; }
  .theme-light #orbA { background: rgba(139, 92, 246, .35); }
  .theme-light #orbB { background: rgba(96, 165, 250, .30); }
  .dot { position: absolute; border-radius: 50%; background: #cdd3ff; filter: blur(1px); }
  .theme-light .dot { background: #6d5fd0; }
  #vignette { position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 50% 42%, transparent 55%, rgba(2,3,8,.55) 100%); }
  .theme-light #vignette {
    background: radial-gradient(120% 90% at 50% 42%, transparent 60%, rgba(30,20,70,.28) 100%); }

  /* 3D scene */
  #scene { position: absolute; inset: 0; perspective: 1650px; perspective-origin: 50% 46%; }
  #cam { position: absolute; inset: 0; transform-style: preserve-3d; }
  .pagegrp { position: absolute; left: 0; top: 0; width: 1080px; height: 1920px;
    transform-style: preserve-3d; }
  .pagegrp img { display: block; -webkit-user-drag: none; }
  .plate { position: absolute; left: 0; top: 0; width: 1080px; height: 1920px;
    border-radius: 6px; }
  .layer { position: absolute; transform-style: preserve-3d; border-radius: 14px;
    will-change: transform; }
  .layer img { width: 100%; height: 100%; border-radius: inherit; }
  .layer .glassbits { position: absolute; inset: 0; border-radius: inherit;
    pointer-events: none; border: 1px solid rgba(255,255,255,.34);
    box-shadow: 0 40px 90px rgba(2, 4, 14, .55); opacity: 0; overflow: hidden; }
  .theme-light .layer .glassbits { border-color: rgba(255,255,255,.75);
    box-shadow: 0 40px 90px rgba(40, 30, 90, .35); }
  .layer .sheen { position: absolute; top: -30%; bottom: -30%; width: 55%;
    background: linear-gradient(105deg, transparent 8%, rgba(255,255,255,.42) 50%, transparent 92%);
    transform: skewX(-18deg) translateX(-260%); }

  /* clay cursor (screen-space) */
  #cursor3d { position: absolute; left: 0; top: 0; width: 230px; height: 230px;
    margin: -30px 0 0 -30px; opacity: 0; will-change: transform; filter:
    drop-shadow(0 30px 34px rgba(3,5,16,.5)); }
  #ripple1, #ripple2 { position: absolute; border-radius: 50%; opacity: 0;
    border: 7px solid rgba(167,139,250,.9); }
  .theme-light #ripple1, .theme-light #ripple2 { border-color: rgba(109,63,240,.85); }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; }

  /* captions */
  #cap { position: absolute; left: 50%; top: 1520px; transform: translateX(-50%);
    width: 930px; text-align: center; opacity: 0; }
  #capPlate { display: inline-block; background: rgba(8,10,22,.74);
    border: 1px solid rgba(255,255,255,.14); border-radius: 26px;
    padding: 30px 44px; backdrop-filter: blur(6px); }
  #capBig { font-family: "Space Grotesk"; font-weight: 700; font-size: 60px;
    line-height: 1.06; color: #fff; letter-spacing: .5px; }
  #capBig .hl { color: #a78bfa; }
  #capSub { font-size: 34px; color: rgba(255,255,255,.82); margin-top: 10px; }

  /* technique chip */
  #chip { position: absolute; left: 40px; top: 40px; background: rgba(8,10,22,.55);
    border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 16px 22px; }
  #chipL1 { font-family: "JetBrains Mono"; font-weight: 700; font-size: 24px;
    color: rgba(255,255,255,.82); letter-spacing: 1px; }
  #chipL2 { font-size: 21px; color: rgba(255,255,255,.5); margin-top: 5px; }

  /* end card */
  #endcard { position: absolute; inset: 0; opacity: 0;
    background: linear-gradient(180deg, rgba(7,8,18,.9), rgba(11,8,30,.96));
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; }
  #ecMark { width: 170px; height: 170px; }
  #ecBrand { font-family: "Space Grotesk"; font-weight: 700; font-size: 92px; color: #fff; }
  #ecUrl { font-family: "JetBrains Mono"; font-weight: 700; font-size: 46px;
    color: #0b0c18; background: #fff; border-radius: 60px; padding: 20px 52px;
    margin-top: 46px; }
  #ecTag { font-size: 36px; color: rgba(255,255,255,.78); margin-top: 42px; }
  #ecPills { display: flex; gap: 22px; margin-top: 34px; }
  .ecPill { font-size: 30px; font-weight: 600; color: #e9e6ff;
    border: 1px solid rgba(255,255,255,.28); border-radius: 40px; padding: 12px 34px; }

  /* controls (never recorded: hidden by ?rec) */
  #controls { position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center; background: rgba(10,12,26,.85);
    border: 1px solid rgba(255,255,255,.15); border-radius: 14px; padding: 10px 14px;
    z-index: 50; color: #cfd3ec; font-size: 14px; }
  #controls button { background: #262a4a; color: #e8eaff; border: 0; border-radius: 9px;
    padding: 8px 14px; font-size: 14px; cursor: pointer; font-family: inherit; }
  #controls button:hover { background: #34396199; }
  #controls input[type=range] { width: 260px; accent-color: #8b5cf6; }
  #loading { position: fixed; inset: 0; display: grid; place-items: center;
    background: #05060d; color: #aab; z-index: 90; font-size: 18px;
    font-family: "JetBrains Mono", monospace; }
</style>
</head>
<body>
<div id="viewport">
  <div id="frame">
    <div id="bgfx">
      <div class="orb" id="orbA"></div>
      <div class="orb" id="orbB"></div>
    </div>
    <div id="vignette"></div>
    <div id="scene"><div id="cam">
      <div class="pagegrp" id="homeGrp"></div>
      <div class="pagegrp" id="decGrp"></div>
    </div></div>
    <div id="ripple1"></div><div id="ripple2"></div>
    <div id="cursor3d">
      <svg viewBox="0 0 100 100" width="230" height="230">
        <defs>
          <radialGradient id="clay" cx="32%" cy="26%" r="85%">
            <stop offset="0%" stop-color="#c4b5fd"/>
            <stop offset="45%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#5b21b6"/>
          </radialGradient>
        </defs>
        <path d="M22 8 L84 52 L56 58 L70 88 L58 94 L44 64 L24 78 Z"
          fill="#3b1a78" transform="translate(3 5)" opacity=".55"/>
        <path d="M22 8 L84 52 L56 58 L70 88 L58 94 L44 64 L24 78 Z" fill="url(#clay)"
          stroke="#ede9fe" stroke-width="2.5" stroke-linejoin="round"/>
        <ellipse cx="38" cy="26" rx="13" ry="7" fill="rgba(255,255,255,.5)"
          transform="rotate(32 38 26)"/>
      </svg>
    </div>
    <div id="flash"></div>
    <div id="cap"><div id="capPlate">
      <div id="capBig"></div><div id="capSub"></div>
    </div></div>
    <div id="endcard">
      <img id="ecMark" src="assets/logo-percentage.png" alt="Just Percent logo" />
      <div id="ecBrand"></div>
      <div id="ecUrl"></div>
      <div id="ecTag"></div>
      <div id="ecPills"></div>
    </div>
    <div id="chip"><div id="chipL1"></div><div id="chipL2"></div></div>
  </div>
</div>

<div id="controls">
  <button id="btnPlay">▶ Play</button>
  <button id="btnRestart">↺</button>
  <button id="btnTheme">☀️ Light</button>
  <input type="range" id="scrub" min="0" max="32000" value="0" step="33">
  <span id="tlabel">0.00s</span>
</div>
<div id="loading">loading frames…</div>

<script src="configs.js"></script>
<script src="geometry.js"></script>
<script>
(() => {
  const CFG = window.F1, GEO = window.F1GEO;
  const Q = new URLSearchParams(location.search);
  const REC = Q.has("rec");
  let THEME = Q.get("theme") === "light" ? "light" : "dark";
  const D = CFG.meta.duration * 1000;
  const K = CFG.meta.cssToStage;

  // ---------- helpers ----------
  const $ = (id) => document.getElementById(id);
  const clamp01 = (v) => Math.max(0, Math.min(1, v));
  const lerp = (a, b, u) => a + (b - a) * u;
  const EASE = {
    l: (u) => u,
    i: (u) => u * u * u,
    o: (u) => 1 - Math.pow(1 - u, 3),
    io: (u) => (u < .5 ? 4 * u * u * u : 1 - Math.pow(-2 * u + 2, 3) / 2),
    back: (u) => 1 + 2.2 * Math.pow(u - 1, 3) + 1.2 * Math.pow(u - 1, 2)
  };
  // pose keyframes
  function pose(ts) {
    const keys = CFG.cam;
    if (ts <= keys[0].t) return keys[0];
    for (let i = 0; i < keys.length - 1; i++) {
      const a = keys[i], b = keys[i + 1];
      if (ts >= a.t && ts <= b.t) {
        const u = EASE[b.e || "io"]((ts - a.t) / (b.t - a.t || 1));
        const o = {};
        for (const k of ["x", "y", "s", "rx", "ry"]) o[k] = lerp(a[k], b[k], u);
        return o;
      }
    }
    return keys[keys.length - 1];
  }
  // seeded pseudo-random
  const rnd = (i) => {
    const v = Math.sin(i * 127.1 + 311.7) * 43758.5453;
    return v - Math.floor(v);
  };

  // ---------- build scene ----------
  const frame = $("frame"), cam = $("cam");
  const homeGrp = $("homeGrp"), decGrp = $("decGrp");
  const imgs = []; // {el, kind:'plate-home'|..., key}
  function mkImg(cls) {
    const img = new Image();
    img.className = cls;
    return img;
  }
  // home: bg plate + peel layers
  const homePlate = mkImg("plate");
  homeGrp.appendChild(homePlate);
  imgs.push({ el: homePlate, src: (t) => `assets/home-bg-${t}.png` });
  const layerEls = {}; // key -> {wrap, img, geo(t)}
  for (const key of CFG.peel.order) {
    const g = GEO[THEME].home.layers[key];
    if (!g) continue;
    const wrap = document.createElement("div");
    wrap.className = "layer";
    const img = mkImg("");
    const glass = document.createElement("div");
    glass.className = "glassbits";
    const sheen = document.createElement("div");
    sheen.className = "sheen";
    glass.appendChild(sheen);
    wrap.appendChild(img); wrap.appendChild(glass);
    homeGrp.appendChild(wrap);
    layerEls[key] = { wrap, img, glass, sheen };
    imgs.push({ el: img, src: (t) => `assets/home-layer-${key}-${t}.png` });
  }
  // CTA marker for the cursor target (inside 3D group)
  const marker = document.createElement("div");
  marker.style.cssText = "position:absolute;width:2px;height:2px;";
  homeGrp.appendChild(marker);

  // dec: bg plate (hint hidden) + glass panels
  const decPlate = mkImg("plate");
  decGrp.appendChild(decPlate);
  imgs.push({ el: decPlate, src: (t) => `assets/dec-bg-${t}.png` });
  const panelEls = [];
  for (const p of CFG.glass.panels) {
    const wrap = document.createElement("div");
    wrap.className = "layer";
    const img = mkImg("");
    const glass = document.createElement("div");
    glass.className = "glassbits";
    const sheen = document.createElement("div");
    sheen.className = "sheen";
    glass.appendChild(sheen);
    wrap.appendChild(img); wrap.appendChild(glass);
    decGrp.appendChild(wrap);
    panelEls.push({ cfg: p, wrap, img, glass, sheen });
    const name = p.key.replace("Clip", "");
    imgs.push({ el: img, src: (t) => `assets/dec-layer-${name}-${t}.png` });
  }

  function applyGeometry() {
    const H = GEO[THEME];
    for (const key of Object.keys(layerEls)) {
      const c = H.home.layers[key].clip;
      const st = layerEls[key].wrap.style;
      st.left = c.x * K + "px"; st.top = c.y * K + "px";
      st.width = c.w * K + "px"; st.height = c.h * K + "px";
    }
    const c0 = H.home.layers[CFG.focus.key];
    marker.style.left = c0.ctaCx * K + "px";
    marker.style.top = c0.ctaCy * K + "px";
    for (const pe of panelEls) {
      const c = H.dec[pe.cfg.key];
      const st = pe.wrap.style;
      st.left = c.x * K + "px"; st.top = c.y * K + "px";
      st.width = c.w * K + "px"; st.height = c.h * K + "px";
    }
  }

  // particles
  const dots = [];
  for (let i = 0; i < 34; i++) {
    const d = document.createElement("div");
    d.className = "dot";
    const s = 3 + rnd(i) * 6;
    d.style.width = d.style.height = s + "px";
    $("bgfx").appendChild(d);
    dots.push({ el: d, x: rnd(i + 50) * 1080, y0: rnd(i + 99) * 1920,
      sp: 14 + rnd(i + 7) * 26, f: 0.6 + rnd(i + 3) * 1.6, ph: rnd(i + 31) * 6.28 });
  }

  // chip + endcard copy
  $("chipL1").textContent = `TECHNIQUE ${CFG.meta.id}/7 · ${CFG.meta.technique}`;
  $("chipL2").textContent = CFG.meta.detail;
  $("ecBrand").textContent = CFG.endCopy.brand;
  $("ecUrl").textContent = CFG.endCopy.url;
  $("ecTag").textContent = CFG.endCopy.tagline;
  for (const p of CFG.endCopy.pills) {
    const d = document.createElement("div");
    d.className = "ecPill"; d.textContent = p;
    $("ecPills").appendChild(d);
  }

  // ---------- theme ----------
  function setTheme(t) {
    THEME = t;
    document.body.classList.toggle("theme-light", t === "light");
    $("btnTheme").textContent = t === "dark" ? "☀️ Light" : "🌙 Dark";
    for (const rec of imgs) rec.el.src = rec.src(t);
    applyGeometry();
    return Promise.all(
      imgs.map((r) => r.el.decode().catch(() => {}))
    );
  }

  // ---------- render ----------
  const capEl = $("cap"), capBig = $("capBig"), capSub = $("capSub");
  function renderFrame(ms) {
    const t = ms / 1000;
    const P = pose(t);

    // camera shake
    let sx = 0, sy = 0, srz = 0;
    const sh = CFG.shake, dt = t - sh.at;
    if (dt > 0 && dt < 1.4) {
      const k = Math.exp(-sh.decay * dt) * sh.amp;
      sx = Math.sin(dt * 41) * k; sy = Math.cos(dt * 33) * k * 0.8;
      srz = Math.sin(dt * 25) * k * 0.06;
    }
    cam.style.transform =
      `translate3d(${P.x + sx}px, ${P.y + sy}px, 0) rotateX(${P.rx}deg) ` +
      `rotateY(${P.ry}deg) rotateZ(${srz}deg) scale(${P.s})`;

    // ---- home group + peel ----
    const swap = CFG.swap;
    const su = clamp01((t - swap.start) / (swap.end - swap.start));
    const homeZ = EASE.i(su) * 1500;
    homeGrp.style.transform = `translateZ(${homeZ}px)`;
    homeGrp.style.opacity = su < .7 ? 1 : 1 - (su - .7) / .3;
    homeGrp.style.visibility = su >= 1 ? "hidden" : "visible";

    const peel = CFG.peel, foc = CFG.focus;
    CFG.peel.order.forEach((key, i) => {
      const L = layerEls[key]; if (!L) return;
      const start = peel.start + i * peel.stagger;
      const u = EASE.back(clamp01((t - start) / peel.rise));
      let z = peel.depths[key] * u;
      let dim = 1, blur = 0, extra = 0;
      // focus phase: hero card forward, others recede
      const fu = clamp01((t - foc.start) / 0.8) * (t < foc.end ? 1 : clamp01(1 - (t - foc.end) / 0.8));
      if (key === foc.key) {
        z += 46 * fu;
        // impact press (damped spring)
        const idt = t - CFG.cursor.impact;
        if (idt > 0) extra = -85 * Math.exp(-7 * idt) * Math.cos(12 * idt);
      } else {
        z = z * (1 - 0.55 * fu);
        dim = 1 - (1 - foc.dimOthers) * fu;
        blur = foc.blurOthers * fu;
      }
      const bob = Math.sin(t * peel.bob.speed * 6.28 + i * 1.4) * peel.bob.amp * u;
      L.wrap.style.transform = `translateZ(${z + extra + bob}px)`;
      L.wrap.style.opacity = dim;
      L.wrap.style.filter = blur > .05 ? `blur(${blur.toFixed(2)}px)` : "";
      L.glass.style.opacity = 0.9 * u;
      const shx = clamp01((u - 0.55) / 0.45);
      L.sheen.style.transform = `skewX(-18deg) translateX(${-260 + shx * 470}%)`;
    });

    // ---- clay cursor + slam ----
    const cur = CFG.cursor, cEl = $("cursor3d");
    if (t >= cur.enter && t <= cur.leave + 0.6) {
      // live screen position of the CTA marker (deterministic in t)
      const fr = frame.getBoundingClientRect();
      const mr = marker.getBoundingClientRect();
      const S = fr.width / 1080;
      const tx = (mr.left - fr.left) / S, ty = (mr.top - fr.top) / S;
      const u = EASE.o(clamp01((t - cur.enter) / (cur.impact - cur.enter)));
      const iu = 1 - u;
      const bx = iu*iu*iu*cur.from.x + 3*iu*iu*u*cur.ctrl1.x + 3*iu*u*u*cur.ctrl2.x + u*u*u*tx;
      const by = iu*iu*iu*cur.from.y + 3*iu*iu*u*cur.ctrl1.y + 3*iu*u*u*cur.ctrl2.y + u*u*u*ty;
      const idt = t - cur.impact;
      let scl = lerp(1.5, 1.0, u), rot = lerp(-24, -6, u), sqx = 1, sqy = 1;
      let op = clamp01((t - cur.enter) / 0.25);
      if (idt > 0) {
        const spr = Math.exp(-8 * idt);
        sqy = 1 - 0.32 * spr * Math.cos(16 * idt);
        sqx = 1 + 0.22 * spr * Math.cos(16 * idt);
        op = t > cur.leave ? clamp01(1 - (t - cur.leave) / 0.5) : 1;
      }
      cEl.style.opacity = op;
      cEl.style.transform =
        `translate(${bx}px, ${by}px) rotate(${rot}deg) scale(${sqx}, ${sqy})`;
      // ripples
      for (const [rid, delay] of [["ripple1", 0], ["ripple2", 0.14]]) {
        const rEl = $(rid), rt = idt - delay;
        if (rt > 0 && rt < 0.9) {
          const rr = EASE.o(rt / 0.9) * 460;
          rEl.style.opacity = (1 - rt / 0.9) * 0.9;
          rEl.style.left = tx - rr + "px"; rEl.style.top = ty - rr + "px";
          rEl.style.width = rEl.style.height = rr * 2 + "px";
        } else rEl.style.opacity = 0;
      }
    } else {
      cEl.style.opacity = 0; $("ripple1").style.opacity = 0; $("ripple2").style.opacity = 0;
    }

    // flashes
    let fv = 0;
    for (const f of CFG.flash) {
      const fdt = t - f.at;
      if (fdt > 0 && fdt < f.len) fv = Math.max(fv, f.peak * (1 - fdt / f.len));
    }
    $("flash").style.opacity = fv;

    // ---- dec group + glass ----
    const du = clamp01((t - swap.start - 0.5) / (swap.end - swap.start - 0.3));
    const dz = (1 - EASE.o(du)) * -1500;
    decGrp.style.transform = `translateZ(${dz}px)`;
    decGrp.style.opacity = du;
    decGrp.style.visibility = du <= 0 ? "hidden" : "visible";

    const gl = CFG.glass;
    let maxRise = 0;
    const rea = CFG.reassemble;
    const ru = EASE.io(clamp01((t - rea.start) / (rea.end - rea.start)));
    for (const pe of panelEls) {
      const start = gl.start + pe.cfg.delay;
      let u = EASE.back(clamp01((t - start) / gl.rise));
      u *= (1 - ru); // reassemble: settle back flat
      maxRise = Math.max(maxRise, u);
      let z = pe.cfg.z * u, pop = 0;
      if (pe.cfg.key === "resultClip") {
        const pdt = t - gl.resultPop.at;
        if (pdt > 0) pop = gl.resultPop.scale * Math.exp(-4 * pdt) * Math.sin(9 * pdt) * (1 - ru);
      }
      const bob = Math.sin(t * 4.2 + pe.cfg.z) * 4 * u;
      pe.wrap.style.transform = `translateZ(${z + bob}px) scale(${1 + pop})`;
      pe.glass.style.opacity = 0.9 * u;
      const shx = clamp01((u - 0.5) / 0.5);
      pe.sheen.style.transform = `skewX(-18deg) translateX(${-260 + shx * 470}%)`;
    }
    decPlate.style.filter = maxRise > .02 ? `blur(${(gl.plateBlur * maxRise).toFixed(2)}px)` : "";

    // ---- captions ----
    let cap = null;
    for (const c of CFG.captions) if (t >= c.t0 && t <= c.t1) { cap = c; break; }
    if (cap) {
      const inU = EASE.o(clamp01((t - cap.t0) / 0.32));
      const outU = EASE.i(clamp01((cap.t1 - t) / 0.28));
      capEl.style.opacity = Math.min(inU, outU);
      capEl.style.transform = `translateX(-50%) translateY(${(1 - inU) * 46}px)`;
      if (capBig.textContent !== cap.big) {
        capBig.textContent = cap.big; capSub.textContent = cap.sub;
        capSub.style.display = cap.sub ? "" : "none";
      }
    } else capEl.style.opacity = 0;

    // ---- backdrop drift ----
    $("orbA").style.transform =
      `translate(${-180 + Math.sin(t * .21) * 90}px, ${120 + Math.cos(t * .17) * 120}px)`;
    $("orbB").style.transform =
      `translate(${520 + Math.cos(t * .13) * 110}px, ${1150 + Math.sin(t * .19) * 140}px)`;
    for (const d of dots) {
      const y = ((d.y0 - t * d.sp) % 2040 + 2040) % 2040 - 60;
      d.el.style.transform = `translate(${d.x}px, ${y}px)`;
      d.el.style.opacity = .18 + .3 * (0.5 + 0.5 * Math.sin(t * d.f + d.ph));
    }

    // ---- end card ----
    const ec = $("endcard");
    const eu = EASE.o(clamp01((t - CFG.endcard.start) / 0.8));
    ec.style.opacity = eu;
    if (eu > 0) {
      const els = ["ecMark", "ecBrand", "ecUrl", "ecTag", "ecPills"];
      els.forEach((id, i) => {
        const uu = EASE.o(clamp01((t - CFG.endcard.start - i * 0.14) / 0.6));
        const el = $(id);
        el.style.opacity = uu;
        el.style.transform = `translateY(${(1 - uu) * 60}px)`;
      });
    }
  }

  // ---------- master clock ----------
  let playing = false, t0 = 0, tAcc = 0, stopAt = null;
  function now() { return performance.now(); }
  function curT() { return playing ? Math.min(D, tAcc + now() - t0) : tAcc; }
  function seek(ms) { tAcc = Math.max(0, Math.min(D, ms)); t0 = now(); renderFrame(tAcc); sync(); }
  function play() {
    if (playing) return;
    if (tAcc >= D) tAcc = 0;
    playing = true; t0 = now(); $("btnPlay").textContent = "⏸ Pause"; tick();
  }
  function pause() { tAcc = curT(); playing = false; $("btnPlay").textContent = "▶ Play"; }
  function tick() {
    if (!playing) return;
    const t = curT();
    renderFrame(t); sync();
    if (stopAt != null && t >= stopAt) { stopAt = null; pause(); return; }
    if (t >= D) { pause(); return; }
    requestAnimationFrame(tick);
  }
  function sync() {
    const t = curT();
    $("scrub").value = t; $("tlabel").textContent = (t / 1000).toFixed(2) + "s";
  }

  // ---------- controls ----------
  $("btnPlay").onclick = () => (playing ? pause() : play());
  $("btnRestart").onclick = () => { pause(); seek(0); };
  $("btnTheme").onclick = () => setTheme(THEME === "dark" ? "light" : "dark")
    .then(() => renderFrame(curT()));
  $("scrub").oninput = (e) => { pause(); seek(+e.target.value); };
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); playing ? pause() : play(); }
    if (e.key === "r" || e.key === "R") { pause(); seek(0); }
  });
  if (REC) $("controls").style.display = "none";

  // fit stage to window
  function fit() {
    const s = Math.min(innerWidth / 1080, innerHeight / 1920);
    frame.style.transform = `translate(-50%,-50%) scale(${s})`;
    frame.style.transformOrigin = "center center";
  }
  addEventListener("resize", fit); fit();

  // QA hook
  window.__f1Seek = async (sec, theme) => {
    if (theme && theme !== THEME) await setTheme(theme);
    pause(); seek(sec * 1000);
    await Promise.all(imgs.map((r) => r.el.decode().catch(() => {})));
    renderFrame(sec * 1000);
    return true;
  };

  // ---------- boot ----------
  setTheme(THEME).then(() => {
    $("loading").style.display = "none";
    applyGeometry();
    const tq = Q.get("t"), stq = Q.get("stop");
    if (stq) stopAt = +stq;
    seek(tq ? +tq : 0);
    if (!tq || stq) { if (!Q.has("pause")) play(); }
  });
})();
</script>
</body>
</html>
